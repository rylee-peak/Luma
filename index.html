<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luma - Life, Organized.</title>
  
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Import Map to resolve bare module specifiers generated by Babel and lock exact React versions -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react",
        "react-dom/client": "https://esm.sh/react-dom/client",
        "react/jsx-runtime": "https://esm.sh/react/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react"
      }
    }
  </script>

  <style>
    .select-none { user-select: none; -webkit-user-select: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #F8FAFC; }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Menu, X, Home, Calendar as CalendarIcon, CheckSquare, 
      Image as ImageIcon, Settings, LogOut, Plus, Bell, 
      Sun, Monitor, UserPlus, Trash2, Clock, Megaphone, Star, Upload, Trophy, Target, Info, RefreshCw,
      Check, MapPin, Map, Users, AlignLeft, Gift, Palette, PartyPopper
    } from 'lucide-react';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup,
      signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const defaultFirebaseConfig = {
      apiKey: "AIzaSyDJ7p0VmrQXpzqOjXPAFk-g7jm4VylcsEQ",
      authDomain: "luma-ab930.firebaseapp.com",
      projectId: "luma-ab930",
      storageBucket: "luma-ab930.firebasestorage.app",
      messagingSenderId: "624626266999",
      appId: "1:624626266999:web:90419858ad42842b262772"
    };

    let firebaseConfig = defaultFirebaseConfig;
    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
      }
    } catch (e) {
      console.error("Firebase config parsing error", e);
    }
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'luma-default';

    const PROFILE_COLORS = [
      '#3B82F6', // Blue
      '#EF4444', // Red
      '#10B981', // Green
      '#F59E0B', // Yellow
      '#8B5CF6', // Purple
      '#EC4899', // Pink
      '#F97316', // Orange
      '#14B8A6', // Teal
      '#6366F1'  // Violet
    ];

    const safeGetStorage = (key, defaultValue) => {
      try {
        const item = window.localStorage.getItem(key);
        return item ? JSON.parse(item) : defaultValue;
      } catch (e) {
        return defaultValue;
      }
    };

    const safeSetStorage = (key, value) => {
      try {
        if (value === undefined || value === null) window.localStorage.removeItem(key);
        else window.localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {}
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try { document.execCommand('copy'); } catch (err) { console.error('Unable to copy', err); }
      document.body.removeChild(textArea);
    };

    const getTodayDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const openInMaps = (location) => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const encodedLoc = encodeURIComponent(location);
      if (isIOS) {
        window.open(`https://maps.apple.com/?q=${encodedLoc}`, '_blank');
      } else {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodedLoc}`, '_blank');
      }
    };

    // Time Format Helpers
    const formatTimeDisplay = (timeStr) => {
      if (!timeStr) return '';
      if (timeStr.includes('AM') || timeStr.includes('PM')) return timeStr;
      
      const [hours, minutes] = timeStr.split(':');
      const h = parseInt(hours, 10);
      if (isNaN(h)) return timeStr;
      
      const ampm = h >= 12 ? 'PM' : 'AM';
      const formattedHour = h % 12 || 12;
      return `${formattedHour}:${minutes} ${ampm}`;
    };

    const parseTimeToMinutes = (t) => {
      if (!t) return 0;
      if (t.includes('AM') || t.includes('PM')) {
         const [timePart, ampm] = t.split(' ');
         let [h, m] = timePart.split(':');
         h = parseInt(h, 10);
         m = parseInt(m, 10);
         if (ampm === 'PM' && h !== 12) h += 12;
         if (ampm === 'AM' && h === 12) h = 0;
         return h * 60 + m;
      }
      const [h, m] = t.split(':');
      return parseInt(h, 10) * 60 + parseInt(m, 10);
    };

    const getEventBackgroundStyle = (event, members) => {
       if (event.category === 'Google Calendar') return { background: '#4285F4' }; 
       if (!event.members || event.members.length === 0) return { background: '#94A3B8' }; 
       
       const memberColors = event.members.map(memberId => {
          const m = members.find(x => x.id === memberId);
          return m?.color || '#3B82F6'; 
       });

       if (memberColors.length === 1) {
           return { background: memberColors[0] };
       }
       
       const stops = memberColors.join(', ');
       return { background: `linear-gradient(to right, ${stops})` };
    };

    const getEventBorderStyle = (event, members) => {
       if (event.category === 'Google Calendar') return { borderColor: '#4285F4' };
       if (!event.members || event.members.length === 0) return { borderColor: '#94A3B8' };
       
       const m = members.find(x => x.id === event.members[0]);
       return { borderColor: m?.color || '#3B82F6' };
    };

    function ErrorAlert({ error }) {
      const [showDetails, setShowDetails] = useState(false);
      if (!error) return null;
      return (
        <div className="mb-6 bg-red-50 text-red-700 text-sm rounded-xl border border-red-100 overflow-hidden text-left fade-in">
          <div className="p-3 flex items-start justify-between gap-2">
            <span className="font-medium">{error.text}</span>
            {error.details && (
              <button 
                type="button" 
                onClick={(e) => { e.preventDefault(); setShowDetails(!showDetails); }} 
                className="text-red-500 hover:text-red-800 shrink-0 mt-0.5" 
                title="View Technical Details"
              >
                <Info size={16} />
              </button>
            )}
          </div>
          {showDetails && error.details && (
            <div className="p-3 bg-red-100/50 border-t border-red-100 text-xs font-mono break-words text-red-800">
              {error.details}
            </div>
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error("ErrorBoundary caught an error:", error, errorInfo);
        this.setState({ errorInfo });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-8 text-center font-sans">
              <div className="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full border border-red-100">
                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6"><Info size={32} /></div>
                <h1 className="text-3xl font-bold text-red-600 mb-4">Something went wrong.</h1>
                <p className="text-slate-600 mb-6 font-medium">The application encountered an unexpected error and could not continue rendering.</p>
                <div className="bg-slate-50 p-4 rounded-xl text-left overflow-auto max-h-64 text-sm font-mono text-red-800 border border-slate-200">
                  <strong>{this.state.error && this.state.error.toString()}</strong>
                  <br/><br/>
                  <span className="opacity-70">{this.state.errorInfo && this.state.errorInfo.componentStack}</span>
                </div>
                <button onClick={() => window.location.reload()} className="mt-6 px-8 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition-colors shadow-sm">
                  Reload Application
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function Modal({ isOpen, onClose, title, children, maxWidth = 'max-w-2xl' }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4 fade-in" onClick={onClose}>
          <div className={`bg-white rounded-3xl shadow-2xl w-full ${maxWidth} overflow-hidden flex flex-col max-h-[90vh]`} onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center p-6 border-b border-slate-100 shrink-0">
              <h3 className="font-bold text-xl">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                <X size={20}/>
              </button>
            </div>
            <div className="p-6 overflow-y-auto overflow-x-hidden">
              {children}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [uiLoggedIn, setUiLoggedIn] = useState(() => safeGetStorage('luma_ui_logged_in', false));
      const [isSyncing, setIsSyncing] = useState(false);
      
      const [household, setHousehold] = useState(null);
      const [pairedHousehold, setPairedHousehold] = useState(() => safeGetStorage('luma_pairedHousehold', null));
      const [members, setMembers] = useState([]);
      const [events, setEvents] = useState(() => safeGetStorage('luma_events', []));
      const [chores, setChores] = useState(() => safeGetStorage('luma_chores', []));
      const [announcements, setAnnouncements] = useState(() => safeGetStorage('luma_announcements', []));
      const [familyGoal, setFamilyGoal] = useState(() => safeGetStorage('luma_familyGoal', 500));
      const [weather, setWeather] = useState(() => safeGetStorage('luma_weather', { temp: 72, condition: 'Sunny' }));
      const [photos, setPhotos] = useState([]); 
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      const [isEventModalOpen, setIsEventModalOpen] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null); 
      const [isChoreModalOpen, setIsChoreModalOpen] = useState(false);
      const [isAnnouncementModalOpen, setIsAnnouncementModalOpen] = useState(false);

      const [eventTitle, setEventTitle] = useState("");
      const [eventTime, setEventTime] = useState("");
      const [eventDate, setEventDate] = useState(getTodayDateString());
      const [eventCategory, setEventCategory] = useState("Family");
      const [eventLocation, setEventLocation] = useState("");
      const [eventDescription, setEventDescription] = useState("");
      const [eventMembers, setEventMembers] = useState([]);

      const [choreTitle, setChoreTitle] = useState("");
      const [chorePoints, setChorePoints] = useState("");
      const [choreAssignee, setChoreAssignee] = useState("");

      const [announcementTitle, setAnnouncementTitle] = useState("");
      const [announcementText, setAnnouncementText] = useState("");

      useEffect(() => { safeSetStorage('luma_pairedHousehold', pairedHousehold); }, [pairedHousehold]);
      useEffect(() => { safeSetStorage('luma_events', events); }, [events]);
      useEffect(() => { safeSetStorage('luma_chores', chores); }, [chores]);
      useEffect(() => { safeSetStorage('luma_announcements', announcements); }, [announcements]);
      useEffect(() => { safeSetStorage('luma_familyGoal', familyGoal); }, [familyGoal]);

      const updateHouseholdMembers = async (newMembers) => {
        setMembers(newMembers);
        if (household?.id) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', household.id), { members: newMembers }).catch(console.error);
        }
      };

      const updateHouseholdData = async (newHousehold) => {
        setHousehold(newHousehold);
        if (newHousehold?.id) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', newHousehold.id), { name: newHousehold.name, inviteCode: newHousehold.inviteCode || null }).catch(console.error);
        }
      };

      const syncGoogleCalendar = async (currentUser = user, isBackgroundLoad = false) => {
        const isGoogleAuth = currentUser?.providerData?.some(p => p.providerId === 'google.com');
        if (!isGoogleAuth) return;

        setIsSyncing(true);

        const fetchEventsWithToken = async (token) => {
          const timeMin = new Date().toISOString();
          const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&maxResults=15&singleEvents=true&orderBy=startTime`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error("Invalid token");
          const gcalData = await res.json();
          
          if (gcalData.items) {
            const newEvents = gcalData.items.map(item => {
              const startObj = item.start.dateTime || item.start.date;
              const dateObj = new Date(startObj);
              const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
              
              const h24 = String(dateObj.getHours()).padStart(2, '0');
              const m24 = String(dateObj.getMinutes()).padStart(2, '0');
              
              return {
                id: item.id,
                title: item.summary,
                time: `${h24}:${m24}`,
                date: dateStr,
                category: 'Google Calendar',
                location: item.location || '',
                description: item.description || '',
                members: [] 
              };
            });
            
            setEvents(prev => {
               const nonGoogle = prev.filter(e => e.category !== 'Google Calendar');
               const combined = [...nonGoogle, ...newEvents];
               return combined.filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
            });
          }
        };

        const cachedToken = safeGetStorage('luma_gcal_token', null);
        const cachedTime = safeGetStorage('luma_gcal_token_time', 0);
        const isTokenFresh = cachedToken && (Date.now() - cachedTime < 3500000); 

        if (isBackgroundLoad) {
          if (isTokenFresh) {
            try { await fetchEventsWithToken(cachedToken); } catch (e) { console.log("Cached Google token expired or failed."); }
          }
          setIsSyncing(false);
          return;
        }

        try {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: '489460227318-ph3kmm3avb82p02l073pd897746fogt8.apps.googleusercontent.com',
            scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events',
            callback: async (tokenResponse) => {
              if (tokenResponse.error) {
                console.error("Google Auth Error:", tokenResponse.error);
                setIsSyncing(false);
                return;
              }
              try {
                const token = tokenResponse.access_token;
                safeSetStorage('luma_gcal_token', token);
                safeSetStorage('luma_gcal_token_time', Date.now());
                await fetchEventsWithToken(token);
              } catch (fetchErr) {
                console.error("Failed to fetch Google Calendar events:", fetchErr);
              } finally {
                setIsSyncing(false);
              }
            },
          });
          client.requestAccessToken({ login_hint: currentUser?.email });
        } catch (error) {
          console.error("Failed to initialize GIS client:", error);
          setIsSyncing(false);
        }
      };

      useEffect(() => {
        const initAuth = async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await auth.authStateReady();
              if (auth.currentUser) return; 
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Init Error:", err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser && !currentUser.isAnonymous) {
            try {
              const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid);
              const userSnap = await getDoc(userRef);
              
              if (userSnap.exists() && userSnap.data().householdId) {
                const hRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', userSnap.data().householdId);
                const hSnap = await getDoc(hRef);
                
                if (hSnap.exists()) {
                  setHousehold(hSnap.data());
                  
                  let fetchedMembers = hSnap.data().members || [];
                  let needsUpdate = false;
                  fetchedMembers = fetchedMembers.map((m, i) => {
                    if (!m.color) {
                      needsUpdate = true;
                      return { ...m, color: PROFILE_COLORS[i % PROFILE_COLORS.length] };
                    }
                    return m;
                  });
                  setMembers(fetchedMembers);
                  
                  if (needsUpdate) {
                    await updateDoc(hRef, { members: fetchedMembers }).catch(console.error);
                  }
                  
                  syncGoogleCalendar(currentUser, true);
                } else { setHousehold(null); }
              } else { setHousehold(null); }
            } catch (err) {
              console.error("Cloud sync error:", err);
              setHousehold(null);
            }
          } else {
            setHousehold(null);
            setMembers([]);
          }
          setUser(currentUser);
          setIsAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleLogout = () => {
        signOut(auth);
        safeSetStorage('luma_ui_logged_in', false);
        setUiLoggedIn(false);
        setHousehold(null);
        setMembers([]);
      };

      const handleAddEvent = (e) => {
        e.preventDefault();
        setEvents([...events, { 
          id: Date.now(), 
          title: eventTitle, 
          time: eventTime,
          date: eventDate, 
          category: eventCategory, 
          location: eventLocation,
          description: eventDescription,
          members: eventMembers
        }]);
        setEventTitle(""); setEventTime(""); setEventDate(getTodayDateString()); setEventCategory("Family");
        setEventLocation(""); setEventDescription(""); setEventMembers([]);
        setIsEventModalOpen(false);
      };

      const handleDeleteEvent = (id) => {
        setEvents(events.filter(e => e.id !== id));
        setSelectedEvent(null);
      };

      const handleAddChore = (e) => {
        e.preventDefault();
        setChores([...chores, { id: Date.now(), title: choreTitle, points: Number(chorePoints), assigneeId: choreAssignee, done: false }]);
        setChoreTitle(""); setChorePoints(""); setChoreAssignee(""); setIsChoreModalOpen(false);
      };

      const handleAddAnnouncement = (e) => {
        e.preventDefault();
        const authorName = members.find(m => m.id === user?.uid)?.name || user?.displayName || 'Admin';
        setAnnouncements([{ id: Date.now(), title: announcementTitle, text: announcementText, author: authorName }, ...announcements]);
        setAnnouncementTitle(""); setAnnouncementText(""); setIsAnnouncementModalOpen(false);
      };

      if (isAuthLoading) {
        return (
          <div className="flex h-screen w-screen items-center justify-center bg-slate-50">
            <div className="animate-pulse flex flex-col items-center">
              <div className="h-16 w-16 bg-blue-600 rounded-2xl shadow-lg mb-4 flex items-center justify-center text-white text-3xl font-bold">L</div>
              <div className="text-slate-400 font-medium mt-4">Loading Luma...</div>
            </div>
          </div>
        );
      }

      if (pairedHousehold) return <KioskMode onExit={() => setPairedHousehold(null)} household={pairedHousehold} events={events} chores={chores} announcements={announcements} members={members} weather={weather} />;

      const hasRealProvider = user?.providerData?.length > 0;
      const isTrueUser = user && !user.isAnonymous && (hasRealProvider || uiLoggedIn);

      if (!isTrueUser) {
        return <AuthScreen onPairDisplay={(linkedHousehold) => setPairedHousehold(linkedHousehold)} onLoginSuccess={() => { safeSetStorage('luma_ui_logged_in', true); setUiLoggedIn(true); }} />;
      }

      if (!household) return <OnboardingScreen user={user} setHousehold={setHousehold} members={members} setMembers={setMembers} />;
      if (currentView === 'kiosk') return <KioskMode onExit={() => setCurrentView('dashboard')} household={household} events={events} chores={chores} announcements={announcements} members={members} weather={weather} />;

      const currentUserMember = members.find(m => m.id === user.uid);
      const isAdmin = currentUserMember?.role === 'Owner' || currentUserMember?.role === 'Admin';

      return (
        <div className="flex h-screen w-full bg-[#F8FAFC] text-[#0F172A] font-sans overflow-hidden relative">
          
          {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
          
          <Modal isOpen={isEventModalOpen} onClose={() => setIsEventModalOpen(false)} title="New Event" maxWidth="max-w-xl">
            <form onSubmit={handleAddEvent} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Event Title</label>
                <input required value={eventTitle} onChange={e=>setEventTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., Soccer Practice" />
              </div>
              
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Date</label>
                <input type="date" required value={eventDate} onChange={e=>setEventDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Time</label>
                <input type="time" required value={eventTime} onChange={e=>setEventTime(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Who is this for?</label>
                <div className="flex flex-wrap gap-2">
                  {members.map(m => {
                    const isChecked = eventMembers.includes(m.id);
                    return (

    function OnboardingScreen({ user, setHousehold, members, setMembers }) {
      const [view, setView] = useState('select');
      const [houseName, setHouseName] = useState("");
      const [inviteCode, setInviteCode] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [errorInfo, setErrorInfo] = useState(null);

      const handleCreate = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setErrorInfo(null);
        try {
          const newHouseholdId = 'house_' + Date.now();
          const userEmail = user.email || '';
          const userName = user.displayName || 'You';
          const newMember = { id: user.uid, email: userEmail, name: userName, role: 'Owner', points: 0, color: PROFILE_COLORS[0] };
          const newHousehold = { name: houseName, id: newHouseholdId, members: [newMember], inviteCode: Math.random().toString(36).substring(2, 8).toUpperCase() };
          
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', newHouseholdId), newHousehold);
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { householdId: newHouseholdId });
          
          setHousehold(newHousehold);
          setMembers([newMember]);
        } catch (error) {
          console.error(error);
          let detailMsg = error.message;
          if (error.message.includes('Missing or insufficient permissions')) {
            detailMsg = "Permission Denied: Your Firebase Security Rules are blocking this action. Please go to your Firebase Console > Firestore Database > Rules, and update them to allow access to the /artifacts/ path.";
          }
          setErrorInfo({ text: "Error creating household.", details: detailMsg });
        } finally {
          setIsLoading(false);
        }
      };

      const handleJoin = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setErrorInfo(null);
        if(inviteCode.length === 6) {
          try {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'households'), where('inviteCode', '==', inviteCode));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
              const hDoc = querySnapshot.docs[0];
              const hData = hDoc.data();
              const userEmail = user.email || '';
              const userName = user.displayName || 'You';
              
              const colorAssigned = PROFILE_COLORS[(hData.members?.length || 0) % PROFILE_COLORS.length];
              const newMember = { id: user.uid, email: userEmail, name: userName, role: 'Member', points: 0, color: colorAssigned };
              
              const memberExists = hData.members && hData.members.some(m => m.id === user.uid);
              const updatedMembers = memberExists ? hData.members : [...(hData.members || []), newMember];
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', hData.id), { members: updatedMembers });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { householdId: hData.id });
              
              setHousehold(hData);
              setMembers(updatedMembers);
            } else {
              setErrorInfo({ text: "Invalid or expired invite code.", details: "No household found matching this 6-digit code." });
            }
          } catch (error) {
            console.error(error);
            let detailMsg = error.message;
            if (error.message.includes('Missing or insufficient permissions')) {
              detailMsg = "Permission Denied: Your Firebase Security Rules are blocking this action.";
            }
            setErrorInfo({ text: "Error joining household.", details: detailMsg });
          }
        } else {
          setErrorInfo({ text: "Invalid code format.", details: "Codes must be exactly 6 characters long." });
        }
        setIsLoading(false);
      };

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center p-4 fade-in">
          <div className="absolute top-6 right-6">
            <button onClick={() => signOut(auth)} className="text-slate-500 font-medium hover:text-slate-800">Sign Out</button>
          </div>
          <div className="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center">
            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><Home size={32} /></div>
            
            {view === 'select' && (
              <>
                <h1 className="text-3xl font-bold mb-2">Welcome to Luma</h1>
                <p className="text-slate-500 mb-8">Does your family already use Luma, or are you setting up a new home hub?</p>
                <ErrorAlert error={errorInfo} />
                <div className="space-y-4">
                  <button onClick={() => setView('create')} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <Plus size={20} /> Create New Household
                  </button>
                  <button onClick={() => setView('join')} className="w-full py-4 bg-slate-100 text-slate-800 rounded-xl font-bold hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                    <UserPlus size={20} /> Join Existing Household
                  </button>
                </div>
              </>
            )}

            {view === 'create' && (
              <form onSubmit={handleCreate} className="text-left animate-in fade-in">
                <button type="button" onClick={() => { setView('select'); setErrorInfo(null); }} className="text-slate-400 hover:text-slate-800 mb-4 flex items-center gap-1 text-sm"><X size={16}/> Back</button>
                <h2 className="text-2xl font-bold mb-6">Name your household</h2>
                <ErrorAlert error={errorInfo} />
                <div className="mb-6">
                  <label className="block text-sm font-medium text-slate-700 mb-2">Household Name</label>
                  <input required autoFocus value={houseName} onChange={e => setHouseName(e.target.value)} placeholder="e.g. The Smiths" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <button type="submit" disabled={isLoading} className="w-full py-4 bg-blue-600 disabled:opacity-50 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">{isLoading ? 'Creating...' : 'Complete Setup'}</button>
              </form>
            )}

            {view === 'join' && (
              <form onSubmit={handleJoin} className="text-left animate-in fade-in">
                <button type="button" onClick={() => { setView('select'); setErrorInfo(null); }} className="text-slate-400 hover:text-slate-800 mb-4 flex items-center gap-1 text-sm"><X size={16}/> Back</button>
                <h2 className="text-2xl font-bold mb-6">Enter Invite Code</h2>
                <ErrorAlert error={errorInfo} />
                <div className="mb-6">
                  <label className="block text-sm font-medium text-slate-700 mb-2">6-Digit Code (from Admin)</label>
                  <input required autoFocus maxLength={6} value={inviteCode} onChange={e => setInviteCode(e.target.value.toUpperCase())} placeholder="ABCDEF" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-center tracking-widest text-lg uppercase" />
                </div>
                <button type="submit" disabled={inviteCode.length !== 6 || isLoading} className="w-full py-4 bg-blue-600 disabled:opacity-50 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">{isLoading ? 'Joining...' : 'Join Household'}</button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${active ? 'bg-[#2563EB] text-white font-medium shadow-sm' : 'text-[#64748B] hover:bg-slate-100 font-medium'}`}>
          {React.cloneElement(icon, { size: 20, className: active ? 'text-white' : 'text-slate-400' })}
          <span>{label}</span>
        </button>
      );
    }

    function DashboardView({ currentUser, events, chores, setChores, announcements, setAnnouncements, onAddEvent, isAdmin, onAddAnnouncement, members, setMembers, isSyncing, onManualSync, onViewEvent }) {
      const [showNotifications, setShowNotifications] = useState(false);

      const handleToggleChore = (chore) => {
        const isNowDone = !chore.done;
        setChores(chores.map(c => c.id === chore.id ? { ...c, done: isNowDone } : c));
        setMembers(members.map(m => {
          if (m.id === chore.assigneeId) return { ...m, points: isNowDone ? (m.points || 0) + chore.points : (m.points || 0) - chore.points };
          return m;
        }));
      };

      const todayStr = getTodayDateString();
      const todayEvents = events.filter(e => e.date === todayStr).sort((a,b) => parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time));
      const activeAnnouncement = announcements && announcements.length > 0 ? announcements[0] : null;
      const pendingChores = chores.filter(c => !c.done);

      return (
        <div className="max-w-5xl mx-auto space-y-6 fade-in">
          <header className="flex justify-between items-end mb-8 relative">
            <div>
              <h1 className="text-3xl font-bold text-[#0F172A] tracking-tight">Good morning{currentUser?.name ? `, ${currentUser.name}` : ''}.</h1>
              <p className="text-[#64748B] mt-1 flex items-center gap-2">Here's what's happening today.</p>
            </div>
            
            <div className="flex items-center gap-3 relative">
              <button onClick={onManualSync} className={`hidden sm:flex bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-sm font-bold items-center gap-2 hover:bg-slate-50 transition-colors ${isSyncing ? 'opacity-50' : ''}`} disabled={isSyncing}>
                <RefreshCw size={16} className={isSyncing ? 'animate-spin' : ''} /> {isSyncing ? 'Syncing...' : 'Synced'}
              </button>
              {isAdmin && (
                <button onClick={onAddAnnouncement} className="hidden sm:flex bg-orange-100 text-orange-700 px-4 py-2 rounded-full text-sm font-bold items-center gap-2 hover:bg-orange-200 transition-colors">
                  <Megaphone size={16} /> Post Announcement
                </button>
              )}
              <button onClick={() => setShowNotifications(!showNotifications)} className="bg-white border border-slate-200 p-2 rounded-full shadow-sm text-slate-500 hover:text-blue-600 transition-colors relative">
                <Bell size={20} />
                {pendingChores.length > 0 && <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>}
              </button>
              {showNotifications && (
                <div className="absolute right-0 top-12 w-72 bg-white rounded-2xl shadow-xl border border-slate-100 z-50 overflow-hidden fade-in">
                  <div className="p-4 border-b border-slate-100 font-bold">Notifications</div>
                  {pendingChores.length > 0 ? (
                    <div className="p-4 text-sm text-slate-600 hover:bg-slate-50 cursor-pointer border-b border-slate-50 flex items-center gap-3">
                      <div className="bg-blue-100 text-blue-600 p-2 rounded-full shrink-0"><CheckSquare size={16} /></div>
                      <span>You have {pendingChores.length} chore{pendingChores.length !== 1 ? 's' : ''} left today!</span>
                    </div>
                  ) : (

    function CalendarView({ events, onAddEvent, onViewEvent, members }) {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const [currentMonth, setCurrentMonth] = useState(new Date());

      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      const calendarCells = [];
      for (let i = 0; i < firstDay; i++) {
        calendarCells.push(null);
      }
      for (let i = 1; i <= daysInMonth; i++) {
        calendarCells.push(i);
      }
      while (calendarCells.length % 7 !== 0) {
        calendarCells.push(null);
      }

      const todayStr = getTodayDateString();

      const handlePrevMonth = () => setCurrentMonth(new Date(year, month - 1, 1));
      const handleNextMonth = () => setCurrentMonth(new Date(year, month + 1, 1));
      const handleToday = () => setCurrentMonth(new Date());

      return (
        <div className="max-w-6xl mx-auto h-full flex flex-col fade-in">
          <header className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-3xl font-bold tracking-tight">Calendar</h1>
              <div className="flex items-center gap-4 mt-2">
                <p className="text-slate-500 font-medium text-lg">
                  {currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                </p>
                <div className="flex items-center bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
                  <button onClick={handlePrevMonth} className="px-3 py-1 hover:bg-slate-50 border-r border-slate-200">&lt;</button>
                  <button onClick={handleToday} className="px-3 py-1 hover:bg-slate-50 text-sm font-medium border-r border-slate-200">Today</button>
                  <button onClick={handleNextMonth} className="px-3 py-1 hover:bg-slate-50">&gt;</button>
                </div>
              </div>
            </div>
            <button onClick={() => onAddEvent()} className="px-4 py-2 bg-[#2563EB] text-white rounded-xl font-medium shadow-sm hover:bg-blue-700 flex items-center gap-2">
              <Plus size={18}/> Add Event
            </button>
          </header>
          
          <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
              {days.map(day => (
                <div key={day} className="py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">{day}</div>
              ))}
            </div>
            <div className="flex-1 grid grid-cols-7 grid-rows-5 bg-slate-100 gap-px">
              {calendarCells.map((dateNum, idx) => {
                const isCurrentMonth = dateNum !== null;
                const dateStr = isCurrentMonth ? `${year}-${String(month+1).padStart(2,'0')}-${String(dateNum).padStart(2,'0')}` : null;
                const isToday = dateStr === todayStr; 
                const dayEvents = isCurrentMonth ? events.filter(e => e.date === dateStr).sort((a,b) => parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time)) : [];

                return (
                  <div key={idx} onClick={() => isCurrentMonth && onAddEvent(dateStr)} className={`p-2 min-h-[100px] bg-white transition-colors relative group flex flex-col ${isCurrentMonth ? 'cursor-pointer hover:bg-slate-50' : 'bg-slate-50 opacity-40 cursor-not-allowed'}`}>
                    <div className="flex justify-between items-start">
                      <span className={`
                        inline-flex items-center justify-center w-7 h-7 rounded-full text-sm font-medium
                        ${isToday ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-700'}
                      `}>
                        {dateNum || ''}
                      </span>
                    </div>
                    
                    <div className="flex-1 mt-1 space-y-1 overflow-y-auto">
                      {isCurrentMonth && dayEvents.map(ev => {
                        const displayTime = formatTimeDisplay(ev.time);
                        return (
                          <div key={ev.id} onClick={(e) => { e.stopPropagation(); onViewEvent(ev); }} className="px-2 py-1 text-xs font-bold text-white rounded-md truncate cursor-pointer hover:opacity-90 shadow-sm flex items-center gap-1" style={getEventBackgroundStyle(ev, members)}>
                            {ev.category === 'Birthday' ? <Gift size={10}/> : null}
                            {displayTime} {ev.title}
                          </div>
                        )
                      })}
                    </div>

                    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                       {isCurrentMonth && <Plus size={24} className="text-slate-300" />}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

        const isNowDone = !chore.done;

        setMembers(members.map(m => {

    function SettingsView({ user, household, setHousehold, members, setMembers, isAdmin, weather, setWeather }) {
      const [displays, setDisplays] = useState([]);

      const [linkCode, setLinkCode] = useState("");
      const [linkError, setLinkError] = useState(null);
      const [isLinking, setIsLinking] = useState(false);
      const [activeTab, setActiveTab] = useState('profile');
      const [message, setMessage] = useState({ text: "", type: "success" });
      
      const currentUserMember = members.find(m => m.id === user.uid);
      const [editName, setEditName] = useState(currentUserMember?.name || "You");
      const [editHouseName, setEditHouseName] = useState(household?.name || "");

      const [inviteCode, setInviteCode] = useState(household?.inviteCode || "");
      const [zipCode, setZipCode] = useState("");
      const [isWeatherLoading, setIsWeatherLoading] = useState(false);
      
      const [showColorPickerFor, setShowColorPickerFor] = useState(null);

      const showMessage = (text, type = 'success') => { setMessage({ text, type }); setTimeout(() => setMessage({ text: "", type: "success" }), 3000); };

      const handleLink = async () => {
        if(linkCode.length === 6) {
          setIsLinking(true);
          setLinkError(null);
          try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pairing_codes', linkCode);
            const snap = await getDoc(docRef);
            if (snap.exists() && snap.data().status === 'waiting') {
              await updateDoc(docRef, { status: 'linked', household: household });
              setDisplays([...displays, { id: Date.now(), name: "Luma Display", status: "Online" }]);
              setShowLinkInput(false); setLinkCode("");
            } else setLinkError({ text: "Invalid or expired code." });
          } catch(err) { setLinkError({ text: "An error occurred.", details: err.message }); } finally { setIsLinking(false); }
        }
      };

      const handleSaveWeather = async () => {
        if(!zipCode) return;
        setIsWeatherLoading(true);
        try {
          const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zipCode)}&count=1&language=en&format=json`);
          const geoData = await geoRes.json();
          if (geoData.results && geoData.results.length > 0) {
             const { latitude, longitude, name } = geoData.results[0];
             const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
             const weatherData = await weatherRes.json();
             
             let condition = 'Clear';
             const code = weatherData.current_weather.weathercode;
             if (code >= 61 && code <= 65) condition = 'Rain';
             if (code >= 71 && code <= 75) condition = 'Snow';
             if (code === 3) condition = 'Cloudy';

             const newWeather = { temp: Math.round(weatherData.current_weather.temperature), condition, location: name };
             setWeather(newWeather);
             safeSetStorage('luma_weather', newWeather);
             showMessage("Location weather updated!");
          } else showMessage("Could not find location.", "error");
        } catch (error) { showMessage("Weather service unavailable.", "error"); }
        setIsWeatherLoading(false); setZipCode("");
      };
      
      const updateMemberColor = (memberId, colorHex) => {
        setMembers(members.map(m => m.id === memberId ? { ...m, color: colorHex } : m));
        setShowColorPickerFor(null);
      };

      return (
        <div className="max-w-4xl mx-auto fade-in flex flex-col md:flex-row gap-8">
          <div className="w-full md:w-64 space-y-2 shrink-0">
            <h1 className="text-2xl font-bold mb-6 px-4">Settings</h1>

          <div className="grid grid-cols-3 gap-8 flex-1">
            <div className="col-span-1 flex flex-col gap-8">
              {activeAnnouncement && (
                <div className="bg-gradient-to-br from-orange-400 to-orange-500 rounded-[2rem] p-8 shadow-lg text-white">
                  <div className="flex items-center gap-3 mb-4 opacity-80 uppercase tracking-widest text-sm font-bold"><Megaphone size={20}/> Announcement</div>
                  <h3 className="text-3xl font-bold mb-3 leading-tight">{activeAnnouncement.title}</h3>
                  <p className="text-xl opacity-90">{activeAnnouncement.text}</p>
                </div>
              )}
              <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200 flex-1 flex flex-col">
                <h3 className="text-3xl font-bold mb-8 flex items-center gap-4 text-slate-800"><CheckSquare className="text-blue-500" size={32} /> Today's Tasks</h3>
                <div className="space-y-6 flex-1 overflow-hidden">
                  {chores && chores.length > 0 ? (
                    chores.map(chore => {
                      const assignee = members?.find(m => m.id === chore.assigneeId);
                      return (
                        <div key={chore.id} className={`flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${chore.done ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-100 shadow-sm'}`}>
                          <div className="flex items-center gap-5">
                            <div className={`w-10 h-10 rounded-xl border-4 flex items-center justify-center ${chore.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300 text-transparent'}`}><CheckSquare size={24} /></div>
                            <span className={`text-2xl font-bold ${chore.done ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{chore.title}</span>

                          {assignee && <div className="w-10 h-10 text-white rounded-full flex items-center justify-center font-bold text-lg shadow-sm" style={{backgroundColor: assignee.color || '#3B82F6'}}>{assignee.name.charAt(0)}</div>}

    function AuthScreen({ onPairDisplay, onLoginSuccess }) {
      const [isPairingMode, setIsPairingMode] = useState(false);
      const [pairingCode, setPairingCode] = useState("");
      const [isRegistering, setIsRegistering] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [authError, setAuthError] = useState(null);
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      useEffect(() => {
        let unsub = () => {};
        if (isPairingMode) {
          const code = Math.random().toString(36).substring(2, 8).toUpperCase();
          setPairingCode(code);
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pairing_codes', code);
          setDoc(docRef, { status: 'waiting', createdAt: serverTimestamp() }).catch(console.error);
          unsub = onSnapshot(docRef, (snap) => {
             if (snap.exists() && snap.data().status === 'linked') {
                 onPairDisplay(snap.data().household);
                 deleteDoc(docRef).catch(console.error);
             }
          }, (err) => console.error(err));
        }
        return () => unsub();
      }, [isPairingMode, onPairDisplay]);

      const handleGoogleLogin = async () => {
        setAuthError(null);
        const provider = new GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/calendar.readonly');
        provider.addScope('https://www.googleapis.com/auth/calendar.events');
        try {
          await signInWithPopup(auth, provider);
          if (onLoginSuccess) onLoginSuccess();
        } catch (error) { setAuthError({ text: "Google Sign-In failed.", details: error.message }); }
      };

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setAuthError(null); setIsAuthenticating(true);
        try {
          if (isRegistering) await createUserWithEmailAndPassword(auth, email, password);
          else await signInWithEmailAndPassword(auth, email, password);
          if (onLoginSuccess) onLoginSuccess();
        } catch (error) { setAuthError({ text: "Authentication failed.", details: error.message }); } 
        finally { setIsAuthenticating(false); }
      };

      if (isPairingMode) {
        return (
          <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="mx-auto h-16 w-16 bg-slate-800 rounded-2xl shadow-xl flex items-center justify-center text-white mb-6"><Monitor size={32} /></div>
              <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Setup Luma Display</h2>
              <p className="mt-2 text-center text-sm text-slate-600">Enter this code in your Luma App under Settings &gt; Displays.</p>
            </div>
            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-12 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200 text-center relative overflow-hidden">
                 <div className="text-5xl sm:text-6xl font-mono tracking-[0.15em] font-bold text-[#2563EB] mb-8 select-all">{pairingCode || "------"}</div>
                 <div className="flex items-center justify-center gap-3 text-slate-500 mb-8"><div className="w-5 h-5 border-2 border-slate-300 border-t-[#2563EB] rounded-full animate-spin"></div><span className="font-medium">Waiting for connection...</span></div>
                 <button onClick={() => { setIsPairingMode(false); setPairingCode(""); }} className="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
          <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div className="mx-auto h-16 w-16 bg-[#2563EB] rounded-2xl shadow-xl flex items-center justify-center text-white font-bold text-4xl mb-6">L</div>
            <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Welcome to Luma</h2>
            <p className="mt-2 text-center text-sm text-slate-600">Life, Organized.</p>
          </div>
          <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div className="bg-white py-8 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200">
              <ErrorAlert error={authError} />
              <form onSubmit={handleEmailAuth} className="space-y-4 mb-6">
                <div><label className="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="you@example.com" /></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label><input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" /></div>
                <button type="submit" disabled={isAuthenticating} className="w-full py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-[#0F172A] hover:bg-slate-800 transition-colors disabled:opacity-70">{isAuthenticating ? 'Please wait...' : (isRegistering ? 'Create Account' : 'Sign In')}</button>
              </form>
              <div className="text-center mb-6"><button onClick={() => { setIsRegistering(!isRegistering); setAuthError(null); }} className="text-sm font-medium text-blue-600 hover:underline">{isRegistering ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}</button></div>
              <div className="relative mb-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200" /></div><div className="relative flex justify-center text-sm"><span className="px-2 bg-white text-slate-400">or continue with</span></div></div>
              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors"><svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
              <div className="mt-8 pt-6 border-t border-slate-100"><button onClick={() => setIsPairingMode(true)} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-dashed border-slate-300 rounded-xl text-sm font-medium text-slate-600 hover:border-slate-400 hover:bg-slate-50 transition-colors"><Monitor size={18} className="text-slate-400" /> Setup a Luma Display</button></div>
            </div>
          </div>
        </div>
      );
    }

    try {
      const root = createRoot(document.getElementById('root'));
      root.render(<ErrorBoundary><App /></ErrorBoundary>);
    } catch (renderError) {
      console.error("Critical rendering error:", renderError);
    }
  </script>
</body>
</html>
