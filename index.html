<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luma - Life, Organized.</title>
  
  <!-- Link to the Web App Manifest for PWA installation -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone (Compiles React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map to resolve bare module specifiers generated by Babel and exact React versions -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1"
      }
    }
  </script>

  <style>
    /* Prevent text selection in Kiosk Mode */
    .select-none { user-select: none; -webkit-user-select: none; }
    /* Hide scrollbars for cleaner look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #F8FAFC; }
    
    /* Smooth transitions */
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Menu, X, Home, Calendar as CalendarIcon, CheckSquare, 
      Image as ImageIcon, Settings, LogOut, Plus, Bell, 
      Sun, Monitor, UserPlus, Trash2, Clock, Gift, Star, Upload
    } from 'lucide-react';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup,
      signInAnonymously, signInWithCustomToken
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJ7p0VmrQXpzqOjXPAFk-g7jm4VylcsEQ",
      authDomain: "luma-ab930.firebaseapp.com",
      projectId: "luma-ab930",
      storageBucket: "luma-ab930.firebasestorage.app",
      messagingSenderId: "624626266999",
      appId: "1:624626266999:web:90419858ad42842b262772"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'luma-default';

    const GOOGLE_CLIENT_ID = "489460227318-ph3kmm3avb82p02l073pd897746fogt8.apps.googleusercontent.com";

    // Reusable Modal Component
    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4 fade-in">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div className="flex justify-between items-center p-6 border-b border-slate-100 shrink-0">
              <h3 className="font-bold text-xl">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                <X size={20}/>
              </button>
            </div>
            <div className="p-6 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      // Auth State
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [household, setHousehold] = useState(null);
      const [pairedHousehold, setPairedHousehold] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // --- GLOBAL APP STATE (Shared across all views) ---
      const [events, setEvents] = useState([]);
      const [chores, setChores] = useState([]);
      const [rewards, setRewards] = useState([]);
      const [photos, setPhotos] = useState([]);
      const [members, setMembers] = useState([]);
      const [familyPoints, setFamilyPoints] = useState(0);
      const [showAnnouncement, setShowAnnouncement] = useState(true);

      // --- MODAL STATES ---
      const [isEventModalOpen, setIsEventModalOpen] = useState(false);
      const [isChoreModalOpen, setIsChoreModalOpen] = useState(false);
      const [isRewardModalOpen, setIsRewardModalOpen] = useState(false);
      const [isInviteModalOpen, setIsInviteModalOpen] = useState(false);

      // Form States
      const [eventTitle, setEventTitle] = useState("");
      const [eventTime, setEventTime] = useState("");
      const [eventDate, setEventDate] = useState("22");
      const [eventCategory, setEventCategory] = useState("Family");

      const [choreTitle, setChoreTitle] = useState("");
      const [chorePoints, setChorePoints] = useState("");

      const [rewardTitle, setRewardTitle] = useState("");
      const [rewardCost, setRewardCost] = useState("");

      const [inviteEmail, setInviteEmail] = useState("");

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth init error:", err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsAuthLoading(false);
          // If the user is fully logged in (not an anonymous pairing device)
          if (currentUser && !currentUser.isAnonymous) {
            setHousehold({ name: "Luma", id: 'local_h_123' });
            if(members.length === 0) {
               setMembers([{ id: currentUser.uid, email: currentUser.email || 'user@example.com', name: currentUser.displayName || 'You', role: 'Owner' }]);
            }
          } else {
            setHousehold(null);
          }
        });
        return () => unsubscribe();
      }, []);

      const handleLogout = () => {
        signOut(auth);
      };

      const handleAddEvent = (e) => {
        e.preventDefault();
        setEvents([...events, { 
          id: Date.now(), title: eventTitle, time: eventTime, date: parseInt(eventDate), 
          category: eventCategory, color: 'bg-blue-500' 
        }]);
        setEventTitle(""); setEventTime(""); setEventDate("22"); setIsEventModalOpen(false);
      };

      const handleAddChore = (e) => {
        e.preventDefault();
        setChores([...chores, { 
          id: Date.now(), title: choreTitle, points: Number(chorePoints), done: false 
        }]);
        setChoreTitle(""); setChorePoints(""); setIsChoreModalOpen(false);
      };

      const handleAddReward = (e) => {
        e.preventDefault();
        setRewards([...rewards, { 
          id: Date.now(), title: rewardTitle, cost: Number(rewardCost)
        }]);
        setRewardTitle(""); setRewardCost(""); setIsRewardModalOpen(false);
      };

      const handleInvite = (e) => {
        e.preventDefault();
        setMembers([...members, { id: Date.now(), email: inviteEmail, name: 'Pending...', role: 'Member' }]);
        setInviteEmail(""); setIsInviteModalOpen(false);
      };

      if (isAuthLoading) {
        return (
          <div className="flex h-screen w-screen items-center justify-center bg-slate-50">
            <div className="animate-pulse flex flex-col items-center">
              <div className="h-16 w-16 bg-blue-600 rounded-2xl shadow-lg mb-4 flex items-center justify-center text-white text-3xl font-bold">L</div>
              <div className="text-slate-400 font-medium mt-4">Loading Luma...</div>
            </div>
          </div>
        );
      }

      if (pairedHousehold) {
        return <KioskMode onExit={() => setPairedHousehold(null)} household={pairedHousehold} events={events} chores={chores} />;
      }

      // If the user isn't fully authenticated, force them to the login/setup screen
      if (!user || user.isAnonymous) {
        return <AuthScreen onPairDisplay={(linkedHousehold) => setPairedHousehold(linkedHousehold)} user={user} />;
      }

      if (currentView === 'kiosk') {
        return <KioskMode onExit={() => setCurrentView('dashboard')} household={household} events={events} chores={chores} />;
      }

      return (
        <div className="flex h-screen w-full bg-[#F8FAFC] text-[#0F172A] font-sans overflow-hidden relative">
          
          {/* OVERLAYS & MODALS */}
          {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
          
          <Modal isOpen={isEventModalOpen} onClose={() => setIsEventModalOpen(false)} title="New Event">
            <form onSubmit={handleAddEvent} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Event Title</label>
                <input required value={eventTitle} onChange={e=>setEventTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Soccer Practice" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Time</label>
                  <input type="time" required value={eventTime} onChange={e=>setEventTime(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Date (June)</label>
                  <input type="number" min="1" max="30" required value={eventDate} onChange={e=>setEventDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Category</label>
                <select value={eventCategory} onChange={e=>setEventCategory(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                  <option>Family</option><option>School</option><option>Sports</option><option>Medical</option>
                </select>
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Save Event</button>
            </form>
          </Modal>

          <Modal isOpen={isChoreModalOpen} onClose={() => setIsChoreModalOpen(false)} title="Add Chore">
            <form onSubmit={handleAddChore} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Chore Description</label>
                <input required value={choreTitle} onChange={e=>setChoreTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Unload the dishwasher" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Reward Points</label>
                <input type="number" min="1" required value={chorePoints} onChange={e=>setChorePoints(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="10" />
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Create Chore</button>
            </form>
          </Modal>

          <Modal isOpen={isRewardModalOpen} onClose={() => setIsRewardModalOpen(false)} title="Create Reward">
            <form onSubmit={handleAddReward} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Reward Name</label>
                <input required value={rewardTitle} onChange={e=>setRewardTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Pizza Night" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Point Cost</label>
                <input type="number" min="1" required value={rewardCost} onChange={e=>setRewardCost(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="50" />
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Add Reward</button>
            </form>
          </Modal>

          <Modal isOpen={isInviteModalOpen} onClose={() => setIsInviteModalOpen(false)} title="Invite Member">
            <form onSubmit={handleInvite} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" required value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="family@example.com" />
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Send Invite</button>
            </form>
          </Modal>

          {/* Sidebar */}
          <aside className={`
            fixed lg:static inset-y-0 left-0 z-50
            w-64 bg-white border-r border-slate-200 transform transition-transform duration-300 ease-in-out
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
            flex flex-col
          `}>
            <div className="p-6 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="h-8 w-8 bg-[#2563EB] rounded-lg flex items-center justify-center text-white font-bold text-xl">L</div>
                <span className="font-bold text-xl tracking-tight">Luma</span>
              </div>
              <button className="lg:hidden text-slate-500" onClick={() => setIsSidebarOpen(false)}>
                <X size={24} />
              </button>
            </div>

            <nav className="flex-1 px-4 space-y-1 mt-4">
              <NavItem icon={<Home size={20}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CalendarIcon size={20}/>} label="Calendar" active={currentView === 'calendar'} onClick={() => {setCurrentView('calendar'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CheckSquare size={20}/>} label="Tasks & Chores" active={currentView === 'chores'} onClick={() => {setCurrentView('chores'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Gift size={20}/>} label="Rewards" active={currentView === 'rewards'} onClick={() => {setCurrentView('rewards'); setIsSidebarOpen(false);}} />
              <NavItem icon={<ImageIcon size={20}/>} label="Photos" active={currentView === 'photos'} onClick={() => {setCurrentView('photos'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Settings size={20}/>} label="Settings" active={currentView === 'settings'} onClick={() => {setCurrentView('settings'); setIsSidebarOpen(false);}} />
            </nav>

            <div className="p-4 border-t border-slate-100">
              <button onClick={() => setCurrentView('kiosk')} className="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors font-medium mb-2">
                <Monitor size={20} />
                <span>Kiosk Mode</span>
              </button>
              
              <div className="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-xl">
                <div className="h-10 w-10 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold uppercase">
                  {user?.displayName ? user.displayName.charAt(0) : (user?.email ? user.email.charAt(0) : 'U')}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold truncate">{user?.displayName || user?.email?.split('@')[0] || 'User'}</p>
                  <p className="text-xs text-slate-500 truncate">{household?.name}</p>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500"><LogOut size={18} /></button>
              </div>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between lg:hidden z-10">
              <button onClick={() => setIsSidebarOpen(true)} className="text-slate-600"><Menu size={24} /></button>
              <span className="font-bold">{household?.name}</span>
              <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-500">
                 {user?.displayName ? user.displayName.charAt(0) : 'U'}
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 relative">
              {currentView === 'dashboard' && <DashboardView user={user} events={events} chores={chores} setChores={setChores} setFamilyPoints={setFamilyPoints} onAddEvent={() => setIsEventModalOpen(true)} showAnnouncement={showAnnouncement} setShowAnnouncement={setShowAnnouncement} />}
              {currentView === 'calendar' && <CalendarView events={events} onAddEvent={() => setIsEventModalOpen(true)} />}
              {currentView === 'chores' && <ChoresView chores={chores} setChores={setChores} familyPoints={familyPoints} setFamilyPoints={setFamilyPoints} onAddChore={() => setIsChoreModalOpen(true)} />}
              {currentView === 'rewards' && <RewardsView rewards={rewards} familyPoints={familyPoints} setFamilyPoints={setFamilyPoints} onAddReward={() => setIsRewardModalOpen(true)} setRewards={setRewards} />}
              {currentView === 'photos' && <PhotosView photos={photos} setPhotos={setPhotos} />}
              {currentView === 'settings' && <SettingsView members={members} setMembers={setMembers} onInvite={() => setIsInviteModalOpen(true)} />}
            </div>
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${active ? 'bg-[#2563EB] text-white font-medium shadow-sm' : 'text-[#64748B] hover:bg-slate-100 font-medium'}`}>
          {React.cloneElement(icon, { size: 20, className: active ? 'text-white' : 'text-slate-400' })}
          <span>{label}</span>
        </button>
      );
    }

    function DashboardView({ user, events, chores, setChores, setFamilyPoints, onAddEvent, showAnnouncement, setShowAnnouncement }) {
      const [showNotifications, setShowNotifications] = useState(false);

      const handleToggleChore = (chore) => {
        const isNowDone = !chore.done;
        setChores(chores.map(c => c.id === chore.id ? { ...c, done: isNowDone } : c));
        setFamilyPoints(p => isNowDone ? p + chore.points : p - chore.points);
      };

      const todayEvents = events.filter(e => e.date === 22 || e.date === parseInt(new Date().getDate()));

      return (
        <div className="max-w-5xl mx-auto space-y-6 fade-in">
          <header className="flex justify-between items-end mb-8 relative">
            <div>
              <h1 className="text-3xl font-bold text-[#0F172A] tracking-tight">
                Good morning{user?.displayName || user?.email ? `, ${user.displayName || user.email.split('@')[0]}` : ''}.
              </h1>
              <p className="text-[#64748B] mt-1">Here's what's happening today.</p>
            </div>
            
            <div className="relative">
              <button onClick={() => setShowNotifications(!showNotifications)} className="bg-white border border-slate-200 p-2 rounded-full shadow-sm text-slate-500 hover:text-blue-600 transition-colors">
                <Bell size={20} />
                <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
              </button>
              {showNotifications && (
                <div className="absolute right-0 mt-2 w-72 bg-white rounded-2xl shadow-xl border border-slate-100 z-50 overflow-hidden fade-in">
                  <div className="p-4 border-b border-slate-100 font-bold">Notifications</div>
                  <div className="p-4 text-sm text-slate-600 hover:bg-slate-50 cursor-pointer border-b border-slate-50">You have chores due today!</div>
                  <div className="p-4 text-sm text-slate-600 hover:bg-slate-50 cursor-pointer">Family Trip announcement posted.</div>
                </div>
              )}
            </div>
          </header>

          {showAnnouncement && (
            <div className="bg-gradient-to-r from-[#F97316] to-orange-400 rounded-3xl p-6 text-white shadow-sm flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="bg-white/20 p-3 rounded-full"><Sun size={24} className="text-white" /></div>
                <div>
                  <h3 className="font-bold text-lg">Family Trip this Weekend!</h3>
                  <p className="text-white/90 text-sm">Don't forget to pack your swimsuits.</p>
                </div>
              </div>
              <button onClick={() => setShowAnnouncement(false)} className="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors"><X size={20} /></button>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 col-span-1 lg:col-span-2">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold">Today's Schedule</h2>
                <button onClick={onAddEvent} className="text-blue-600 text-sm font-medium hover:underline flex items-center gap-1">
                  Add Event <Plus size={16} />
                </button>
              </div>
              <div className="space-y-4">
                {todayEvents.length > 0 ? (
                  todayEvents.map(event => (
                    <div key={event.id} className="flex items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 transition-transform hover:scale-[1.01]">
                      <div className={`w-2 h-12 rounded-full ${event.color} mr-4`}></div>
                      <div className="flex-1">
                        <h4 className="font-bold text-[#0F172A]">{event.title}</h4>
                        <p className="text-sm text-[#64748B]">{event.category}</p>
                      </div>
                      <div className="font-medium text-slate-600 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm">{event.time}</div>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                    <CalendarIcon className="mx-auto mb-2 opacity-40 text-slate-400" size={32} />
                    <p className="font-medium text-slate-600 mt-2">No events scheduled.</p>
                    <p className="text-sm mt-1">Tap below to organize your day.</p>
                  </div>
                )}
                <button onClick={onAddEvent} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-medium hover:border-blue-500 hover:text-blue-600 transition-colors">
                  + Schedule something new
                </button>
              </div>
            </div>

            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold">My Chores</h2>

    function AuthScreen({ onPairDisplay, user }) {
      const [isPairingMode, setIsPairingMode] = useState(false);
      const [pairingCode, setPairingCode] = useState("");
      
      const [isRegistering, setIsRegistering] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [authError, setAuthError] = useState("");
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      useEffect(() => {
        let unsub = () => {};
        if (isPairingMode && user) {
          // Generate a secure 6-character code
          const code = Math.random().toString(36).substring(2, 8).toUpperCase();
          setPairingCode(code);
          
          // Write the code to the cloud
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pairing_codes', code);
          setDoc(docRef, { status: 'waiting', createdAt: serverTimestamp() }).catch(console.error);
          
          // Listen for the phone to confirm the link
          unsub = onSnapshot(docRef, (snap) => {
             if (snap.exists() && snap.data().status === 'linked') {
                 onPairDisplay(snap.data().household);
                 deleteDoc(docRef).catch(console.error); // Clean up the code
             }
          }, (err) => console.error("Pairing stream error:", err));
        }
        return () => unsub();
      }, [isPairingMode, user, onPairDisplay]);

      const handleCancelPairing = () => {
         setIsPairingMode(false);
         setPairingCode("");
         if (pairingCode) {
             deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pairing_codes', pairingCode)).catch(console.error);
         }
      };

      const handleGoogleLogin = async () => {
        setAuthError("");
        const auth = getAuth();
        const provider = new GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/calendar.readonly');
        provider.addScope('https://www.googleapis.com/auth/calendar.events');
        
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          setAuthError(error.message.replace("Firebase: ", ""));
        }
      };

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setAuthError("");
        setIsAuthenticating(true);
        const auth = getAuth();
        try {
          if (isRegistering) {
            await createUserWithEmailAndPassword(auth, email, password);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
        } catch (error) {
          setAuthError(error.message.replace("Firebase: ", ""));
        } finally {
          setIsAuthenticating(false);
        }
      };

      if (isPairingMode) {
        return (
          <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="mx-auto h-16 w-16 bg-slate-800 rounded-2xl shadow-xl flex items-center justify-center text-white mb-6"><Monitor size={32} /></div>
              <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Setup Luma Display</h2>
              <p className="mt-2 text-center text-sm text-slate-600">Enter this code in your Luma App under Settings &gt; Displays to link this device.</p>
            </div>
            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-12 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200 text-center relative overflow-hidden">
                 <div className="text-5xl sm:text-6xl font-mono tracking-[0.15em] font-bold text-[#2563EB] mb-8 select-all">{pairingCode || "------"}</div>
                 <div className="flex items-center justify-center gap-3 text-slate-500 mb-8">
                   <div className="w-5 h-5 border-2 border-slate-300 border-t-[#2563EB] rounded-full animate-spin"></div>
                   <span className="font-medium">Waiting for connection...</span>
                 </div>
                 <button onClick={handleCancelPairing} className="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
          <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div className="mx-auto h-16 w-16 bg-[#2563EB] rounded-2xl shadow-xl flex items-center justify-center text-white font-bold text-4xl mb-6">L</div>
            <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Welcome to Luma</h2>
            <p className="mt-2 text-center text-sm text-slate-600">Life, Organized.</p>
          </div>

          <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div className="bg-white py-8 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200">
              
              {authError && <div className="mb-6 p-3 bg-red-50 text-red-700 text-sm rounded-xl font-medium border border-red-100">{authError}</div>}

              <form onSubmit={handleEmailAuth} className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                  <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="you@example.com" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                  <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" />
                </div>
                <button type="submit" disabled={isAuthenticating} className="w-full py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-[#0F172A] hover:bg-slate-800 transition-colors disabled:opacity-70">
                  {isAuthenticating ? 'Please wait...' : (isRegistering ? 'Create Account' : 'Sign In')}
                </button>
              </form>

              <div className="text-center mb-6">
                <button onClick={() => { setIsRegistering(!isRegistering); setAuthError(""); }} className="text-sm font-medium text-blue-600 hover:underline">
                  {isRegistering ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                </button>
              </div>

              <div className="relative mb-6">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200" /></div>
                <div className="relative flex justify-center text-sm"><span className="px-2 bg-white text-slate-400">or continue with</span></div>
              </div>

              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
              </button>

              <div className="mt-8 pt-6 border-t border-slate-100">
                <button onClick={() => setIsPairingMode(true)} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-dashed border-slate-300 rounded-xl text-sm font-medium text-slate-600 hover:border-slate-400 hover:bg-slate-50 transition-colors">
                  <Monitor size={18} className="text-slate-400" /> Setup a Luma Display
                </button>
              </div>
              
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

    // --- SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => console.log('Service Worker registered.'))
          .catch((error) => console.error('Service Worker registration failed: ', error));
      });
    }
  </script>
</body>
</html>
