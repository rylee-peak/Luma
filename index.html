<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luma - Life, Organized.</title>
  
  <!-- Link to the Web App Manifest for PWA installation -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone (Compiles React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map to resolve bare module specifiers generated by Babel -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1"
      }
    }
  </script>

  <style>
    /* Prevent text selection in Kiosk Mode */
    .select-none { user-select: none; -webkit-user-select: none; }
    /* Hide scrollbars for cleaner look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #F8FAFC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    // Import React & ReactDOM
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    
    // Import Lucide Icons
    import { 
      Menu, X, Home, Calendar as CalendarIcon, CheckSquare, 
      Image as ImageIcon, Settings, LogOut, Plus, Bell, 
      Sun, Monitor, UserPlus, Trash2, Clock, Gift, Star
    } from 'lucide-react';

    // Import Firebase (Using official gstatic browser modules)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, signInAnonymously, onAuthStateChanged, signOut, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      GoogleAuthProvider, signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
      getFirestore, collection, onSnapshot, addDoc, 
      doc, setDoc, query, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJ7p0VmrQXpzqOjXPAFk-g7jm4VylcsEQ",
      authDomain: "luma-ab930.firebaseapp.com",
      projectId: "luma-ab930",
      storageBucket: "luma-ab930.firebasestorage.app",
      messagingSenderId: "624626266999",
      appId: "1:624626266999:web:90419858ad42842b262772"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const GOOGLE_CLIENT_ID = "489460227318-ph3kmm3avb82p02l073pd897746fogt8.apps.googleusercontent.com";

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [household, setHousehold] = useState(null);
      const [pairedHousehold, setPairedHousehold] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsAuthLoading(false);
          if (currentUser) {
            setHousehold({ name: "Luma", id: 'local_h_123' });
          } else {
            setHousehold(null);
          }
        });
        return () => unsubscribe();
      }, []);

      const handleLogout = () => {
        signOut(auth);
      };

      if (isAuthLoading) {
        return (
          <div className="flex h-screen w-screen items-center justify-center bg-slate-50">
            <div className="animate-pulse flex flex-col items-center">
              <div className="h-16 w-16 bg-blue-600 rounded-2xl shadow-lg mb-4 flex items-center justify-center text-white text-3xl font-bold">L</div>
              <div className="text-slate-400 font-medium mt-4">Loading Luma...</div>
            </div>
          </div>
        );
      }

      // First priority: is this display paired and acting as a Kiosk?
      if (pairedHousehold) {
        return <KioskMode onExit={() => setPairedHousehold(null)} household={pairedHousehold} />;
      }

      // Second priority: force user to log in
      if (!user) {
        return <AuthScreen onPairDisplay={(linkedHousehold) => setPairedHousehold(linkedHousehold)} />;
      }

      // Third priority: user intentionally triggered kiosk mode from inside the app
      if (currentView === 'kiosk') {
        return <KioskMode onExit={() => setCurrentView('dashboard')} household={household} />;
      }

      return (
        <div className="flex h-screen w-full bg-[#F8FAFC] text-[#0F172A] font-sans overflow-hidden">
          {/* Mobile Sidebar Overlay */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/20 z-40 lg:hidden"
              onClick={() => setIsSidebarOpen(false)}
            />
          )}

          {/* Sidebar Navigation */}
          <aside className={`
            fixed lg:static inset-y-0 left-0 z-50
            w-64 bg-white border-r border-slate-200 transform transition-transform duration-300 ease-in-out
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
            flex flex-col
          `}>
            <div className="p-6 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="h-8 w-8 bg-[#2563EB] rounded-lg flex items-center justify-center text-white font-bold text-xl">L</div>
                <span className="font-bold text-xl tracking-tight">Luma</span>
              </div>
              <button className="lg:hidden text-slate-500" onClick={() => setIsSidebarOpen(false)}>
                <X size={24} />
              </button>
            </div>

            <nav className="flex-1 px-4 space-y-1 mt-4">
              <NavItem icon={<Home size={20}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CalendarIcon size={20}/>} label="Calendar" active={currentView === 'calendar'} onClick={() => {setCurrentView('calendar'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CheckSquare size={20}/>} label="Tasks & Chores" active={currentView === 'chores'} onClick={() => {setCurrentView('chores'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Gift size={20}/>} label="Rewards" active={currentView === 'rewards'} onClick={() => {setCurrentView('rewards'); setIsSidebarOpen(false);}} />
              <NavItem icon={<ImageIcon size={20}/>} label="Photos" active={currentView === 'photos'} onClick={() => {setCurrentView('photos'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Settings size={20}/>} label="Settings" active={currentView === 'settings'} onClick={() => {setCurrentView('settings'); setIsSidebarOpen(false);}} />
            </nav>

            <div className="p-4 border-t border-slate-100">
              <button 
                onClick={() => setCurrentView('kiosk')}
                className="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors font-medium mb-2"
              >
                <Monitor size={20} />
                <span>Kiosk Mode</span>
              </button>
              
              <div className="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-xl">
                <div className="h-10 w-10 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold uppercase">
                  {user?.displayName ? user.displayName.charAt(0) : 'U'}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold truncate">{user?.displayName || 'User'}</p>
                  <p className="text-xs text-slate-500 truncate">{household?.name}</p>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500">
                  <LogOut size={18} />
                </button>
              </div>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            {/* Top Header (Mobile mainly) */}
            <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between lg:hidden z-10">
              <button onClick={() => setIsSidebarOpen(true)} className="text-slate-600">
                <Menu size={24} />
              </button>
              <span className="font-bold">{household?.name}</span>
              <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-500">
                 {user?.displayName ? user.displayName.charAt(0) : 'U'}
              </div>
            </header>

            {/* Scrollable Content */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              {currentView === 'dashboard' && <DashboardView user={user} />}
              {currentView === 'calendar' && <CalendarView />}
              {currentView === 'chores' && <PlaceholderView title="Tasks & Chores" icon={<CheckSquare size={48}/>} desc="Manage family tasks, assign chores, and track points." />}
              {currentView === 'rewards' && <RewardsView />}
              {currentView === 'photos' && <PlaceholderView title="Family Photos" icon={<ImageIcon size={48}/>} desc="Upload and view shared albums on the Luma Display." />}
              {currentView === 'settings' && <SettingsView />}
            </div>
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${
            active 
              ? 'bg-[#2563EB] text-white font-medium shadow-sm' 
              : 'text-[#64748B] hover:bg-slate-100 font-medium'
          }`}
        >
          {React.cloneElement(icon, { size: 20, className: active ? 'text-white' : 'text-slate-400' })}
          <span>{label}</span>
        </button>
      );
    }

    function DashboardView({ user }) {
      const [events, setEvents] = useState([]);
      const [chores, setChores] = useState([]);

      return (
        <div className="max-w-5xl mx-auto space-y-6">
          <header className="flex justify-between items-end mb-8">
            <div>
              <h1 className="text-3xl font-bold text-[#0F172A] tracking-tight">
                Good morning{user?.displayName ? `, ${user.displayName}` : ''}.
              </h1>
              <p className="text-[#64748B] mt-1">Here's what's happening today.</p>
            </div>
            <button className="bg-white border border-slate-200 p-2 rounded-full shadow-sm text-slate-500 hover:text-blue-600 transition-colors">
              <Bell size={20} />
            </button>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 col-span-1 lg:col-span-2">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold">Today's Schedule</h2>
                <button className="text-blue-600 text-sm font-medium hover:underline flex items-center gap-1">
                  Add Event <Plus size={16} />
                </button>
              </div>
              <div className="space-y-4">
                {events.length > 0 ? (
                  events.map(event => (
                    <div key={event.id} className="flex items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 transition-transform hover:scale-[1.01]">
                      <div className={`w-2 h-12 rounded-full ${event.color} mr-4`}></div>
                      <div className="flex-1">
                        <h4 className="font-bold text-[#0F172A]">{event.title}</h4>
                        <p className="text-sm text-[#64748B]">{event.category}</p>
                      </div>
                      <div className="font-medium text-slate-600 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm">
                        {event.time}
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                    <CalendarIcon className="mx-auto mb-2 opacity-40 text-slate-400" size={32} />
                    <p className="font-medium text-slate-600 mt-2">No events scheduled.</p>
                    <p className="text-sm mt-1">Tap 'Add Event' to sync your calendar.</p>
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold">My Chores</h2>
                <span className="text-sm font-medium bg-blue-100 text-blue-700 px-2 py-1 rounded-md">{chores.filter(c => !c.done).length} Left</span>
              </div>
              <div className="space-y-3">
                {chores.length > 0 ? (
                  chores.map(chore => (
                    <div key={chore.id} className={`flex items-center gap-3 p-3 rounded-xl border ${chore.done ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-200 shadow-sm'}`}>
                      <div className={`w-6 h-6 rounded-md border flex items-center justify-center cursor-pointer ${chore.done ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-300'}`}>
                        {chore.done && <CheckSquare size={16} />}
                      </div>
                      <span className={`flex-1 font-medium ${chore.done ? 'line-through text-slate-500' : 'text-slate-800'}`}>
                        {chore.title}
                      </span>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                    <CheckSquare className="mx-auto mb-2 opacity-40 text-slate-400" size={32} />
                    <p className="font-medium text-slate-600 mt-2">All caught up!</p>
                    <p className="text-sm mt-1">No chores assigned for today.</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SettingsView() {
      const [displays, setDisplays] = useState([]);
      const [showLinkInput, setShowLinkInput] = useState(false);
      const [linkCode, setLinkCode] = useState("");

      const handleLink = () => {
        if(linkCode.length === 6) {
          setDisplays([...displays, { id: Date.now(), name: "New Luma Display", status: "Online" }]);
          setShowLinkInput(false);
          setLinkCode("");
        }
      };

      return (
        <div className="max-w-3xl mx-auto">
          <h1 className="text-3xl font-bold mb-8">Household Settings</h1>
          
          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-6">
            <div className="p-6 border-b border-slate-100">
              <h2 className="text-lg font-bold mb-1">Members</h2>
              <p className="text-slate-500 text-sm mb-4">Manage who has access to your family hub.</p>
              
              <div className="flex items-center justify-between p-4 bg-slate-50 rounded-xl mb-3 border border-slate-100">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center font-bold">U</div>
                  <div>
                    <p className="font-bold">You</p>
                    <p className="text-xs text-slate-500">Owner</p>
                  </div>
                </div>
                <span className="text-sm bg-slate-200 text-slate-600 px-3 py-1 rounded-full font-medium">Admin</span>
              </div>
              
              <button className="flex items-center gap-2 text-blue-600 font-medium px-4 py-2 hover:bg-blue-50 rounded-lg transition-colors">
                <UserPlus size={18} /> Invite Member
              </button>
            </div>
            
            <div className="p-6">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <h2 className="text-lg font-bold mb-1">Displays</h2>
                  <p className="text-slate-500 text-sm">Manage wall-mounted screens using Luma Kiosk Mode.</p>
                </div>
                {!showLinkInput && (
                  <button onClick={() => setShowLinkInput(true)} className="bg-blue-50 text-blue-600 px-3 py-2 rounded-lg font-medium text-sm hover:bg-blue-100 transition-colors">
                    Link Display
                  </button>
                )}
              </div>
              
              {showLinkInput && (
                <div className="mb-4 p-4 bg-slate-50 border border-slate-200 rounded-xl flex gap-3 items-center flex-wrap sm:flex-nowrap">
                  <input 
                    type="text" 
                    maxLength={6}
                    placeholder="Enter 6-digit code from display" 
                    value={linkCode}
                    onChange={(e) => setLinkCode(e.target.value.toUpperCase())}
                    className="flex-1 min-w-[150px] px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono uppercase tracking-wider text-center sm:text-left"
                  />
                  <button 
                    onClick={handleLink}
                    disabled={linkCode.length !== 6}
                    className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium disabled:opacity-50 hover:bg-blue-700 transition-colors"
                  >
                    Link
                  </button>
                  <button onClick={() => { setShowLinkInput(false); setLinkCode(""); }} className="text-slate-500 hover:text-slate-800 p-2">
                    <X size={20} />
                  </button>
                </div>
              )}

              <div className="flex flex-col gap-4">
                 {displays.length > 0 ? (
                   displays.map(display => (
                    <div key={display.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                      <div className="flex items-center gap-3">
                        <Monitor className="text-slate-400" size={24} />
                        <div>
                          <p className="font-bold">{display.name}</p>
                          <p className="text-xs text-green-600 font-medium">● {display.status}</p>
                        </div>
                      </div>
                      <button onClick={() => setDisplays(displays.filter(d => d.id !== display.id))} className="text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors">
                        <Trash2 size={18} />
                      </button>
                    </div>
                   ))
                 ) : (
                   <div className="text-center py-6 border-2 border-dashed border-slate-200 rounded-xl text-slate-500">
                      <Monitor className="mx-auto mb-2 opacity-50" size={24} />
                      <p className="text-sm font-medium">No displays connected.</p>
                      <p className="text-xs mt-1">Click 'Link Display' to pair a new screen.</p>
                   </div>
                 )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CalendarView() {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const dates = Array.from({length: 35}, (_, i) => i - 2); 

      return (
        <div className="max-w-6xl mx-auto h-full flex flex-col">
          <header className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-3xl font-bold tracking-tight">Calendar</h1>
              <p className="text-slate-500">June 2026</p>
            </div>
            <div className="flex gap-2">
              <button className="px-4 py-2 bg-white border border-slate-200 rounded-xl font-medium shadow-sm hover:bg-slate-50">Month</button>
              <button className="px-4 py-2 bg-[#2563EB] text-white rounded-xl font-medium shadow-sm hover:bg-blue-700">Add Event</button>
            </div>
          </header>
          
          <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
              {days.map(day => (
                <div key={day} className="py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">
                  {day}
                </div>
              ))}
            </div>
            <div className="flex-1 grid grid-cols-7 grid-rows-5">
              {dates.map((date, idx) => {
                const isCurrentMonth = date > 0 && date <= 30;
                const isToday = date === 22; 
                return (
                  <div key={idx} className="border-b border-r border-slate-100 p-2 min-h-[100px] hover:bg-slate-50 transition-colors cursor-pointer relative group">
                    <span className={`
                      inline-flex items-center justify-center w-7 h-7 rounded-full text-sm font-medium
                      ${!isCurrentMonth ? 'text-slate-300' : ''}
                      ${isToday ? 'bg-blue-600 text-white' : 'text-slate-700'}
                    `}>
                      {isCurrentMonth ? date : (date <= 0 ? 31 + date : date - 30)}
                    </span>
                    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                       <Plus size={20} className="text-slate-300" />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function RewardsView() {
      const [balances, setBalances] = useState([]);
      const [rewards, setRewards] = useState([]);

      return (
        <div className="max-w-5xl mx-auto space-y-6">
          <header className="flex justify-between items-end mb-8">
            <div>
              <h1 className="text-3xl font-bold tracking-tight">Rewards</h1>
              <p className="text-slate-500 mt-1">Complete chores to earn points and redeem prizes.</p>
            </div>
            <button className="bg-[#2563EB] text-white px-4 py-2 rounded-xl font-medium shadow-sm hover:bg-blue-700 transition-colors flex items-center gap-2">
              <Plus size={18} /> Add Reward
            </button>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1 space-y-6">
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <h2 className="text-xl font-bold mb-4">Point Balances</h2>
                {balances.length > 0 ? (
                  <div className="space-y-4">
                    {balances.map(b => (
                      <div key={b.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                         <span className="font-medium">{b.name}</span>
                         <span className="flex items-center gap-1 font-bold text-orange-500">
                            {b.points} <Star size={16} className="fill-orange-500" />
                         </span>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-6 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                     <Gift className="mx-auto mb-2 opacity-40 text-slate-400" size={24} />
                     <p className="text-sm">No points tracking yet.</p>
                  </div>
                )}
              </div>
            </div>

            <div className="md:col-span-2">
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 h-full">
                 <h2 className="text-xl font-bold mb-6">Available Rewards</h2>
                 {rewards.length > 0 ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                       {rewards.map(r => (
                          <div key={r.id} className="border border-slate-200 p-4 rounded-2xl flex flex-col items-center text-center hover:border-blue-300 transition-colors cursor-pointer">
                             <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-3">
                                <Gift size={32} />
                             </div>
                             <h3 className="font-bold text-lg mb-1">{r.title}</h3>
                             <span className="inline-flex items-center gap-1 bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-sm font-bold">
                                {r.cost} <Star size={14} className="fill-orange-500" />
                             </span>
                          </div>
                       ))}
                    </div>
                 ) : (
                    <div className="text-center py-16 text-slate-500 bg-slate-50 rounded-3xl border border-slate-100 border-dashed flex flex-col items-center justify-center">
                       <Gift className="mb-4 opacity-30 text-slate-400" size={48} />
                       <p className="font-medium text-slate-600 text-lg">No rewards created yet.</p>
                       <p className="text-sm mt-1 mb-4">Set up goals to motivate your family.</p>
                       <button className="text-blue-600 font-medium hover:underline flex items-center gap-1">
                         <Plus size={16} /> Create your first reward
                       </button>
                    </div>
                 )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PlaceholderView({ title, icon, desc }) {
      return (
        <div className="h-full flex flex-col items-center justify-center text-center p-8">
          <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-6">
            {icon}
          </div>
          <h2 className="text-3xl font-bold mb-3">{title}</h2>
          <p className="text-slate-500 max-w-md mb-8">{desc}</p>
          <button className="px-6 py-3 bg-[#0F172A] text-white rounded-xl font-medium shadow-lg hover:bg-slate-800 transition-colors">
            Coming Soon
          </button>
        </div>
      );
    }

    function KioskMode({ onExit, household }) {
      const [time, setTime] = useState(new Date());
      const [events, setEvents] = useState([]);
      const [chores, setChores] = useState([]);

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      return (
        <div className="fixed inset-0 bg-[#0F172A] text-white z-[100] flex flex-col p-8 overflow-hidden select-none">
          <div className="absolute top-0 left-0 w-20 h-20 z-50 cursor-pointer" onClick={onExit} />
          
          <header className="flex justify-between items-start mb-12">
            <div>
              <h2 className="text-2xl font-medium text-slate-400">{household?.name || 'Luma'}</h2>
              <p className="text-xl text-blue-400 flex items-center gap-2 mt-2">
                 <Sun size={24} /> 72° Sunny
              </p>
            </div>
            <div className="text-right">
              <h1 className="text-8xl font-bold tracking-tighter">
                {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
              </h1>
              <p className="text-2xl text-slate-400 mt-2 font-medium">
                {time.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' })}
              </p>
            </div>
          </header>

          <div className="grid grid-cols-3 gap-8 flex-1">
            <div className="col-span-1 bg-slate-800/50 rounded-3xl p-8 border border-slate-700/50 backdrop-blur-md">
              <h3 className="text-2xl font-bold mb-6 flex items-center gap-3">
                 <CheckSquare className="text-orange-500" /> Today's Tasks
              </h3>
              <div className="space-y-4">
                {chores.length > 0 ? (
                  chores.map(chore => (
                    <div key={chore.id} className="flex items-center gap-4 text-xl">
                      <div className={`w-8 h-8 rounded-lg border-2 flex items-center justify-center ${chore.done ? 'bg-orange-500 border-orange-500 text-white' : 'border-slate-500 text-transparent'}`}>
                        ✓
                      </div>
                      <span className={chore.done ? 'text-slate-500 line-through' : 'text-slate-200'}>{chore.title}</span>
                    </div>
                  ))
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500 mt-12">
                     <CheckSquare size={48} className="mb-4 opacity-30" />
                     <p className="text-xl font-medium">No tasks assigned today.</p>
                  </div>
                )}
              </div>
            </div>

            <div className="col-span-2 bg-slate-800/50 rounded-3xl p-8 border border-slate-700/50 backdrop-blur-md">
               <h3 className="text-2xl font-bold mb-6 flex items-center gap-3">
                 <CalendarIcon className="text-blue-500" /> Upcoming Schedule
              </h3>
              <div className="space-y-6">
                 {events.length > 0 ? (
                   events.map(event => (
                    <div key={event.id} className="flex items-center gap-6 bg-slate-900/50 p-6 rounded-2xl">
                      <div className="text-3xl font-bold text-blue-400 w-32">{event.time}</div>
                      <div className={`w-2 h-16 rounded-full ${event.color}`}></div>
                      <div>
                        <h4 className="text-2xl font-bold text-white">{event.title}</h4>
                        <p className="text-xl text-slate-400">{event.category}</p>
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500 mt-20">
                     <CalendarIcon size={64} className="mb-4 opacity-30" />
                     <p className="text-2xl font-medium text-slate-400">Clear calendar ahead.</p>
                     <p className="text-lg mt-2">Enjoy your day!</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AuthScreen({ onPairDisplay }) {
      const [isPairingMode, setIsPairingMode] = useState(false);
      const [pairingCode, setPairingCode] = useState("");
      
      const [isRegistering, setIsRegistering] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [authError, setAuthError] = useState("");
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      useEffect(() => {
        if (isPairingMode && !pairingCode) {
          const code = Math.random().toString(36).substring(2, 8).toUpperCase();
          setPairingCode(code);
        }
      }, [isPairingMode, pairingCode]);

      const handleGoogleLogin = async () => {
        setAuthError("");
        const auth = getAuth();
        const provider = new GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/calendar.readonly');
        provider.addScope('https://www.googleapis.com/auth/calendar.events');
        
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          setAuthError(error.message.replace("Firebase: ", ""));
        }
      };

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setAuthError("");
        setIsAuthenticating(true);
        const auth = getAuth();
        try {
          if (isRegistering) {
            await createUserWithEmailAndPassword(auth, email, password);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
        } catch (error) {
          setAuthError(error.message.replace("Firebase: ", ""));
        } finally {
          setIsAuthenticating(false);
        }
      };

      if (isPairingMode) {
        return (
          <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="mx-auto h-16 w-16 bg-slate-800 rounded-2xl shadow-xl flex items-center justify-center text-white mb-6">
                <Monitor size={32} />
              </div>
              <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">
                Setup Luma Display
              </h2>
              <p className="mt-2 text-center text-sm text-slate-600">
                Enter this code in your Luma App under Settings &gt; Displays to link this device.
              </p>
            </div>

            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-12 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200 text-center relative overflow-hidden">
                 <div className="text-5xl sm:text-6xl font-mono tracking-[0.15em] font-bold text-[#2563EB] mb-8 select-all">
                    {pairingCode || "------"}
                 </div>
                 
                 <div className="flex items-center justify-center gap-3 text-slate-500 mb-8">
                   <div className="w-5 h-5 border-2 border-slate-300 border-t-[#2563EB] rounded-full animate-spin"></div>
                   <span className="font-medium">Waiting for connection...</span>
                 </div>

                 <button onClick={() => { setIsPairingMode(false); setPairingCode(""); }} className="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                    Cancel
                 </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
          <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div className="mx-auto h-16 w-16 bg-[#2563EB] rounded-2xl shadow-xl flex items-center justify-center text-white font-bold text-4xl mb-6">
              L
            </div>
            <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">
              Welcome to Luma
            </h2>
            <p className="mt-2 text-center text-sm text-slate-600">
              Life, Organized.
            </p>
          </div>

          <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div className="bg-white py-8 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200">
              
              {authError && (
                <div className="mb-6 p-3 bg-red-50 text-red-700 text-sm rounded-xl font-medium border border-red-100">
                  {authError}
                </div>
              )}

              <form onSubmit={handleEmailAuth} className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                  <input 
                    type="email" 
                    required 
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="you@example.com"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                  <input 
                    type="password" 
                    required 
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="••••••••"
                  />
                </div>
                <button 
                  type="submit" 
                  disabled={isAuthenticating}
                  className="w-full py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-[#0F172A] hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-colors disabled:opacity-70"
                >
                  {isAuthenticating ? 'Please wait...' : (isRegistering ? 'Create Account' : 'Sign In')}
                </button>
              </form>

              <div className="text-center mb-6">
                <button 
                  onClick={() => { setIsRegistering(!isRegistering); setAuthError(""); }}
                  className="text-sm font-medium text-blue-600 hover:underline"
                >
                  {isRegistering ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                </button>
              </div>

              <div className="relative mb-6">
                <div className="absolute inset-0 flex items-center">
                  <div className="w-full border-t border-slate-200" />
                </div>
                <div className="relative flex justify-center text-sm">
                  <span className="px-2 bg-white text-slate-400">or continue with</span>
                </div>
              </div>

              <button 
                 onClick={handleGoogleLogin} 
                 className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
              </button>

              <div className="mt-8 pt-6 border-t border-slate-100">
                <button 
                   onClick={() => setIsPairingMode(true)}
                   className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-dashed border-slate-300 rounded-xl text-sm font-medium text-slate-600 hover:border-slate-400 hover:bg-slate-50 transition-colors"
                >
                  <Monitor size={18} className="text-slate-400" />
                  Setup a Luma Display
                </button>
              </div>
              
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

    // --- SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('Service Worker registered successfully with scope: ', registration.scope);
          })
          .catch((error) => {
            console.error('Service Worker registration failed: ', error);
          });
      });
    } else {
      console.log('Service Worker registration skipped (running in preview environment).');
    }
  </script>
</body>
</html>
