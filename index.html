<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luma - Life, Organized.</title>
  
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map to resolve bare module specifiers generated by Babel and lock exact React versions -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1"
      }
    }
  </script>

  <style>
    .select-none { user-select: none; -webkit-user-select: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #F8FAFC; }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Menu, X, Home, Calendar as CalendarIcon, CheckSquare, 
      Image as ImageIcon, Settings, LogOut, Plus, Bell, 
      Sun, Monitor, UserPlus, Trash2, Clock, Megaphone, Star, Upload, Trophy, Target, Info, Plug, MapPin, Check
    } from 'lucide-react';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup,
      signInAnonymously, signInWithCustomToken
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebase Config
    const defaultFirebaseConfig = {
      apiKey: "AIzaSyDJ7p0VmrQXpzqOjXPAFk-g7jm4VylcsEQ",
      authDomain: "luma-ab930.firebaseapp.com",
      projectId: "luma-ab930",
      storageBucket: "luma-ab930.firebasestorage.app",
      messagingSenderId: "624626266999",
      appId: "1:624626266999:web:90419858ad42842b262772"
    };

    let firebaseConfig = defaultFirebaseConfig;
    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
      }
    } catch (e) {
      console.error("Firebase config parsing error", e);
    }
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'luma-default';

    // --- HELPERS ---
    const safeGetStorage = (key, defaultValue) => {
      try {
        const item = window.localStorage.getItem(key);
        return item ? JSON.parse(item) : defaultValue;
      } catch (e) {
        return defaultValue;
      }
    };

    const safeSetStorage = (key, value) => {
      try {
        if (value === undefined || value === null) window.localStorage.removeItem(key);
        else window.localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {}
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try { document.execCommand('copy'); } catch (err) { console.error('Unable to copy', err); }
      document.body.removeChild(textArea);
    };

    // Reusable Error Alert Component
    function ErrorAlert({ error }) {
      const [showDetails, setShowDetails] = useState(false);
      if (!error) return null;
      return (
        <div className="mb-6 bg-red-50 text-red-700 text-sm rounded-xl border border-red-100 overflow-hidden text-left fade-in">
          <div className="p-3 flex items-start justify-between gap-2">
            <span className="font-medium">{error.text}</span>
            {error.details && (
              <button 
                type="button" 
                onClick={(e) => { e.preventDefault(); setShowDetails(!showDetails); }} 
                className="text-red-500 hover:text-red-800 shrink-0 mt-0.5" 
                title="View Technical Details"
              >
                <Info size={16} />
              </button>
            )}
          </div>
          {showDetails && error.details && (
            <div className="p-3 bg-red-100/50 border-t border-red-100 text-xs font-mono break-words text-red-800">
              {error.details}
            </div>
          )}
        </div>
      );
    }

    // Reusable Modal Component
    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4 fade-in">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div className="flex justify-between items-center p-6 border-b border-slate-100 shrink-0">
              <h3 className="font-bold text-xl">{title}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                <X size={20}/>
              </button>
            </div>
            <div className="p-6 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [uiLoggedIn, setUiLoggedIn] = useState(() => safeGetStorage('luma_ui_logged_in', false));
      
      // Core Data States (Household/Members now synced to Cloud, others in localStorage for prototype)
      const [household, setHousehold] = useState(null);
      const [pairedHousehold, setPairedHousehold] = useState(() => safeGetStorage('luma_pairedHousehold', null));
      const [members, setMembers] = useState([]);
      const [events, setEvents] = useState(() => safeGetStorage('luma_events', []));
      const [chores, setChores] = useState(() => safeGetStorage('luma_chores', []));
      const [announcements, setAnnouncements] = useState(() => safeGetStorage('luma_announcements', []));
      const [familyGoal, setFamilyGoal] = useState(() => safeGetStorage('luma_familyGoal', 500));
      
      // Photos use Blob URLs which don't survive refresh, so we keep it memory-only for prototype
      const [photos, setPhotos] = useState([]); 
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // Modal States
      const [isEventModalOpen, setIsEventModalOpen] = useState(false);
      const [isChoreModalOpen, setIsChoreModalOpen] = useState(false);
      const [isAnnouncementModalOpen, setIsAnnouncementModalOpen] = useState(false);

      // Form States
      const [eventTitle, setEventTitle] = useState("");
      const [eventTime, setEventTime] = useState("");
      const [eventDate, setEventDate] = useState("22");
      const [eventCategory, setEventCategory] = useState("Family");

      const [choreTitle, setChoreTitle] = useState("");
      const [chorePoints, setChorePoints] = useState("");
      const [choreAssignee, setChoreAssignee] = useState("");

      const [announcementTitle, setAnnouncementTitle] = useState("");
      const [announcementText, setAnnouncementText] = useState("");

      // Weather & Location States
      const [zipCode, setZipCode] = useState(() => safeGetStorage('luma_zip', '92551'));
      const [weather, setWeather] = useState({ temp: '--', condition: 'Loading...', icon: Sun });

      useEffect(() => { safeSetStorage('luma_pairedHousehold', pairedHousehold); }, [pairedHousehold]);
      useEffect(() => { safeSetStorage('luma_events', events); }, [events]);
      useEffect(() => { safeSetStorage('luma_chores', chores); }, [chores]);
      useEffect(() => { safeSetStorage('luma_announcements', announcements); }, [announcements]);
      useEffect(() => { safeSetStorage('luma_familyGoal', familyGoal); }, [familyGoal]);

      // Cloud Sync Wrappers for modifying members & household data
      const updateHouseholdMembers = async (newMembers) => {
        setMembers(newMembers);
        if (household?.id) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', household.id), { members: newMembers }).catch(console.error);
        }
      };

      const updateHouseholdData = async (newHousehold) => {
        setHousehold(newHousehold);
        if (newHousehold?.id) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', newHousehold.id), { name: newHousehold.name, inviteCode: newHousehold.inviteCode || null }).catch(console.error);
        }
      };

      // FETCH REAL WEATHER FROM OPEN-METEO API
      useEffect(() => {
        const fetchWeather = async () => {
          try {
            safeSetStorage('luma_zip', zipCode);
            // 1. Get Lat/Lon from Zip or City Name
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zipCode)}&count=1&language=en&format=json`);
            const geoData = await geoRes.json();
            
            if (geoData.results && geoData.results.length > 0) {
              const { latitude, longitude } = geoData.results[0];
              // 2. Fetch current weather
              const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
              const weatherData = await weatherRes.json();
              
              if(weatherData.current_weather) {
                const temp = Math.round(weatherData.current_weather.temperature);
                const code = weatherData.current_weather.weathercode;
                
                // Simple WMO Weather Code Mapping
                let condition = 'Clear';
                let WIcon = Sun;
                if (code >= 1 && code <= 3) { condition = 'Cloudy'; WIcon = Sun; } // Simplified icons for prototype
                if (code >= 45 && code <= 48) { condition = 'Foggy'; }
                if (code >= 51 && code <= 67) { condition = 'Rain'; }
                if (code >= 71 && code <= 77) { condition = 'Snow'; }
                if (code >= 95) { condition = 'Storm'; }
                
                setWeather({ temp, condition, icon: WIcon });
              }
            }
          } catch (e) {
            console.error("Failed to fetch weather", e);
            setWeather({ temp: '--', condition: 'Offline', icon: Sun });
          }
        };
        
        // Add a small debounce so it doesn't spam the API while typing
        const timeoutId = setTimeout(() => {
          if (zipCode) fetchWeather();
        }, 1000);
        return () => clearTimeout(timeoutId);
      }, [zipCode]);

      // INITIALIZE AUTH FIRST (Rule 3)
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await auth.authStateReady();
              if (auth.currentUser) return; // Don't overwrite existing session in production
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Init Error:", err);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser && !currentUser.isAnonymous) {
            try {
              // 1. Check if user is linked to a household in the cloud (Rule 1 Paths)
              const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid);
              const userSnap = await getDoc(userRef);
              
              if (userSnap.exists() && userSnap.data().householdId) {
                // 2. Fetch the household data from the cloud
                const hRef = doc(db, 'artifacts', appId, 'public', 'data', 'households', userSnap.data().householdId);
                const hSnap = await getDoc(hRef);
                
                if (hSnap.exists()) {
                  setHousehold(hSnap.data());
                  setMembers(hSnap.data().members || []);
                } else {
                  setHousehold(null);
                }
              } else {
                setHousehold(null);
              }
            } catch (err) {
              console.error("Cloud sync error:", err);
              setHousehold(null);
            }
          } else {
            setHousehold(null);
            setMembers([]);
          }
          setUser(currentUser);
          setIsAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleLogout = () => {
        signOut(auth);
        safeSetStorage('luma_ui_logged_in', false);
        setUiLoggedIn(false);
        setHousehold(null);
        setMembers([]);
      };

      const handleAddEvent = (e) => {
        e.preventDefault();
        setEvents([...events, { 
          id: Date.now(), title: eventTitle, time: eventTime, date: parseInt(eventDate), 
          category: eventCategory, color: 'bg-blue-500' 
        }]);
        setEventTitle(""); setEventTime(""); setEventDate("22"); setIsEventModalOpen(false);
      };

      const handleAddChore = (e) => {
        e.preventDefault();
        setChores([...chores, { 
          id: Date.now(), title: choreTitle, points: Number(chorePoints), assigneeId: choreAssignee, done: false 
        }]);
        setChoreTitle(""); setChorePoints(""); setChoreAssignee(""); setIsChoreModalOpen(false);
      };

      const handleAddAnnouncement = (e) => {
        e.preventDefault();
        const authorName = members.find(m => m.id === user?.uid)?.name || user?.displayName || 'Admin';
        setAnnouncements([{ id: Date.now(), title: announcementTitle, text: announcementText, author: authorName }, ...announcements]);
        setAnnouncementTitle(""); setAnnouncementText(""); setIsAnnouncementModalOpen(false);
      };

      if (isAuthLoading) {
        return (
          <div className="flex h-screen w-screen items-center justify-center bg-slate-50">
            <div className="animate-pulse flex flex-col items-center">
              <div className="h-16 w-16 bg-blue-600 rounded-2xl shadow-lg mb-4 flex items-center justify-center text-white text-3xl font-bold">L</div>
              <div className="text-slate-400 font-medium mt-4">Loading Luma...</div>
            </div>
          </div>
        );
      }

      // 1. If viewing as a linked Kiosk Display (No standard user auth required)
      if (pairedHousehold) {
        return <KioskMode onExit={() => setPairedHousehold(null)} household={pairedHousehold} events={events} chores={chores} announcements={announcements} members={members} weather={weather} />;
      }

      const hasRealProvider = user?.providerData?.length > 0;
      const isTrueUser = user && !user.isAnonymous && (hasRealProvider || uiLoggedIn);

      // 2. If user is not explicitly logged in, show the Auth/Setup screen
      if (!isTrueUser) {
        return <AuthScreen 
          onPairDisplay={(linkedHousehold) => setPairedHousehold(linkedHousehold)} 
          onLoginSuccess={() => {
            safeSetStorage('luma_ui_logged_in', true);
            setUiLoggedIn(true);
          }}
        />;
      }

      // 3. User is logged in, but hasn't created or joined a household yet (Onboarding)
      if (!household) {
        return <OnboardingScreen user={user} setHousehold={setHousehold} members={members} setMembers={setMembers} />;
      }

      // 4. User clicked Kiosk Mode inside their own app
      if (currentView === 'kiosk') {
        return <KioskMode onExit={() => setCurrentView('dashboard')} household={household} events={events} chores={chores} announcements={announcements} members={members} weather={weather} />;
      }

      const currentUserMember = members.find(m => m.id === user.uid);
      const isAdmin = currentUserMember?.role === 'Owner' || currentUserMember?.role === 'Admin';

      // 5. Main App Dashboard View
      return (
        <div className="flex h-screen w-full bg-[#F8FAFC] text-[#0F172A] font-sans overflow-hidden relative">
          
          {/* OVERLAYS & MODALS */}
          {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
          
          <Modal isOpen={isEventModalOpen} onClose={() => setIsEventModalOpen(false)} title="New Event">
            <form onSubmit={handleAddEvent} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Event Title</label>
                <input required value={eventTitle} onChange={e=>setEventTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Soccer Practice" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Time</label>
                  <input type="time" required value={eventTime} onChange={e=>setEventTime(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Date (June)</label>
                  <input type="number" min="1" max="30" required value={eventDate} onChange={e=>setEventDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Category</label>
                <select value={eventCategory} onChange={e=>setEventCategory(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                  <option>Family</option><option>School</option><option>Sports</option><option>Medical</option>
                </select>
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Save Event</button>
            </form>
          </Modal>

          <Modal isOpen={isChoreModalOpen} onClose={() => setIsChoreModalOpen(false)} title="Assign Chore">
            <form onSubmit={handleAddChore} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Chore Description</label>
                <input required value={choreTitle} onChange={e=>setChoreTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Unload the dishwasher" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Points</label>
                  <input type="number" min="1" required value={chorePoints} onChange={e=>setChorePoints(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="10" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Assignee</label>
                  <select required value={choreAssignee} onChange={e=>setChoreAssignee(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="" disabled>Select member</option>
                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                </div>
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">Assign Chore</button>
            </form>
          </Modal>

          <Modal isOpen={isAnnouncementModalOpen} onClose={() => setIsAnnouncementModalOpen(false)} title="Post Announcement">
            <form onSubmit={handleAddAnnouncement} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Headline</label>
                <input required value={announcementTitle} onChange={e=>setAnnouncementTitle(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Family Trip this Weekend!" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Message</label>
                <textarea required value={announcementText} onChange={e=>setAnnouncementText(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Details..." rows="3"></textarea>
              </div>
              <button type="submit" className="w-full py-3 mt-4 bg-orange-500 hover:bg-orange-600 text-white rounded-xl font-bold transition-colors">Post Announcement</button>
            </form>
          </Modal>

          {/* Sidebar */}
          <aside className={`
            fixed lg:static inset-y-0 left-0 z-50
            w-64 bg-white border-r border-slate-200 transform transition-transform duration-300 ease-in-out
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}
            flex flex-col
          `}>
            <div className="p-6 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="h-8 w-8 bg-[#2563EB] rounded-lg flex items-center justify-center text-white font-bold text-xl">L</div>
                <span className="font-bold text-xl tracking-tight">Luma</span>
              </div>
              <button className="lg:hidden text-slate-500" onClick={() => setIsSidebarOpen(false)}>
                <X size={24} />
              </button>
            </div>

            <nav className="flex-1 px-4 space-y-1 mt-4">
              <NavItem icon={<Home size={20}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CalendarIcon size={20}/>} label="Calendar" active={currentView === 'calendar'} onClick={() => {setCurrentView('calendar'); setIsSidebarOpen(false);}} />
              <NavItem icon={<CheckSquare size={20}/>} label="Tasks & Chores" active={currentView === 'chores'} onClick={() => {setCurrentView('chores'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Trophy size={20}/>} label="Progress" active={currentView === 'progress'} onClick={() => {setCurrentView('progress'); setIsSidebarOpen(false);}} />
              <NavItem icon={<ImageIcon size={20}/>} label="Photos" active={currentView === 'photos'} onClick={() => {setCurrentView('photos'); setIsSidebarOpen(false);}} />
              <NavItem icon={<Settings size={20}/>} label="Settings" active={currentView === 'settings'} onClick={() => {setCurrentView('settings'); setIsSidebarOpen(false);}} />
            </nav>

            <div className="p-4 border-t border-slate-100">
              <button onClick={() => setCurrentView('kiosk')} className="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors font-medium mb-2">
                <Monitor size={20} />
                <span>Kiosk Mode</span>
              </button>
              
              <div className="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-xl">
                <div className="h-10 w-10 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold uppercase">
                  {currentUserMember?.name ? currentUserMember.name.charAt(0) : 'U'}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold truncate">{currentUserMember?.name || 'User'}</p>
                  <p className="text-xs text-slate-500 truncate">{household?.name}</p>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500"><LogOut size={18} /></button>
              </div>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between lg:hidden z-10">
              <button onClick={() => setIsSidebarOpen(true)} className="text-slate-600"><Menu size={24} /></button>
              <span className="font-bold">{household?.name}</span>
              <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-500">
                 {currentUserMember?.name ? currentUserMember.name.charAt(0) : 'U'}

              {currentView === 'calendar' && <CalendarView events={events} onAddEvent={() => setIsEventModalOpen(true)} />}

    // --- ONBOARDING COMPONENT ---
    function OnboardingScreen({ user, setHousehold, members, setMembers }) {
      const [view, setView] = useState('select'); // select, create, join
      const [houseName, setHouseName] = useState("");
      const [inviteCode, setInviteCode] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [errorInfo, setErrorInfo] = useState(null);

      const handleCreate = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setErrorInfo(null);
        try {
          const newHouseholdId = 'house_' + Date.now();
          
          // CRITICAL FIX: Ensure no fields are undefined before saving to Firestore.
          const userEmail = user.email || '';
          const userName = user.displayName || 'You';
          
          const newMember = { id: user.uid, email: userEmail, name: userName, role: 'Owner', points: 0 };
          const newHousehold = { name: houseName, id: newHouseholdId, members: [newMember], inviteCode: Math.random().toString(36).substring(2, 8).toUpperCase() };
          
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', newHouseholdId), newHousehold);
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { householdId: newHouseholdId });
          
          setHousehold(newHousehold);
          setMembers([newMember]);
        } catch (error) {
          console.error(error);
          let detailMsg = error.message;
          if (error.message.includes('Missing or insufficient permissions')) {
            detailMsg = "Permission Denied: Your Firebase Security Rules are blocking this action. Please go to your Firebase Console > Firestore Database > Rules, and update them to allow access to the /artifacts/ path.";
          }
          setErrorInfo({ text: "Error creating household.", details: detailMsg });
        } finally {
          setIsLoading(false);
        }
      };

      const handleJoin = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setErrorInfo(null);
        if(inviteCode.length === 6) {
          try {
            // Query Cloud for the Invite Code
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'households'), where('inviteCode', '==', inviteCode));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
              const hDoc = querySnapshot.docs[0];
              const hData = hDoc.data();
              
              const userEmail = user.email || '';
              const userName = user.displayName || 'You';
              const newMember = { id: user.uid, email: userEmail, name: userName, role: 'Member', points: 0 };
              
              // Prevent Duplicate Member entries
              const memberExists = hData.members && hData.members.some(m => m.id === user.uid);
              const updatedMembers = memberExists ? hData.members : [...(hData.members || []), newMember];
              
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'households', hData.id), { members: updatedMembers });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { householdId: hData.id });
              
              setHousehold(hData);
              setMembers(updatedMembers);
            } else {
              setErrorInfo({ text: "Invalid or expired invite code.", details: "No household found matching this 6-digit code." });
            }
          } catch (error) {
            console.error(error);
            let detailMsg = error.message;
            if (error.message.includes('Missing or insufficient permissions')) {
              detailMsg = "Permission Denied: Your Firebase Security Rules are blocking this action. Please go to your Firebase Console > Firestore Database > Rules, and update them to allow access.";
            }
            setErrorInfo({ text: "Error joining household.", details: detailMsg });
          }
        } else {
          setErrorInfo({ text: "Invalid code format.", details: "Codes must be exactly 6 characters long." });
        }
        setIsLoading(false);
      };

      const handleLogout = () => { signOut(auth); };

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center p-4 fade-in">
          <div className="absolute top-6 right-6">
            <button onClick={handleLogout} className="text-slate-500 font-medium hover:text-slate-800">Sign Out</button>
          </div>
          <div className="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center">
            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
              <Home size={32} />
            </div>
            
            {view === 'select' && (
              <>
                <h1 className="text-3xl font-bold mb-2">Welcome to Luma</h1>
                <p className="text-slate-500 mb-8">Does your family already use Luma, or are you setting up a new home hub?</p>
                <ErrorAlert error={errorInfo} />
                <div className="space-y-4">
                  <button onClick={() => setView('create')} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <Plus size={20} /> Create New Household
                  </button>
                  <button onClick={() => setView('join')} className="w-full py-4 bg-slate-100 text-slate-800 rounded-xl font-bold hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                    <UserPlus size={20} /> Join Existing Household
                  </button>
                </div>
              </>
            )}

            {view === 'create' && (
              <form onSubmit={handleCreate} className="text-left animate-in fade-in">
                <button type="button" onClick={() => { setView('select'); setErrorInfo(null); }} className="text-slate-400 hover:text-slate-800 mb-4 flex items-center gap-1 text-sm"><X size={16}/> Back</button>
                <h2 className="text-2xl font-bold mb-6">Name your household</h2>
                <ErrorAlert error={errorInfo} />
                <div className="mb-6">
                  <label className="block text-sm font-medium text-slate-700 mb-2">Household Name</label>
                  <input required autoFocus value={houseName} onChange={e => setHouseName(e.target.value)} placeholder="e.g. The Smiths" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <button type="submit" disabled={isLoading} className="w-full py-4 bg-blue-600 disabled:opacity-50 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">{isLoading ? 'Creating...' : 'Complete Setup'}</button>
              </form>
            )}

            {view === 'join' && (
              <form onSubmit={handleJoin} className="text-left animate-in fade-in">
                <button type="button" onClick={() => { setView('select'); setErrorInfo(null); }} className="text-slate-400 hover:text-slate-800 mb-4 flex items-center gap-1 text-sm"><X size={16}/> Back</button>
                <h2 className="text-2xl font-bold mb-6">Enter Invite Code</h2>
                <ErrorAlert error={errorInfo} />
                <div className="mb-6">
                  <label className="block text-sm font-medium text-slate-700 mb-2">6-Digit Code (from Admin)</label>
                  <input required autoFocus maxLength={6} value={inviteCode} onChange={e => setInviteCode(e.target.value.toUpperCase())} placeholder="ABCDEF" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-center tracking-widest text-lg uppercase" />
                </div>
                <button type="submit" disabled={inviteCode.length !== 6 || isLoading} className="w-full py-4 bg-blue-600 disabled:opacity-50 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">{isLoading ? 'Joining...' : 'Join Household'}</button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${active ? 'bg-[#2563EB] text-white font-medium shadow-sm' : 'text-[#64748B] hover:bg-slate-100 font-medium'}`}>

    function DashboardView({ currentUser, events, chores, setChores, announcements, setAnnouncements, onAddEvent, isAdmin, onAddAnnouncement, members, setMembers }) {

        // Reward or subtract points from the assigned member

              <h1 className="text-3xl font-bold text-[#0F172A] tracking-tight">
                Good morning{currentUser?.name ? `, ${currentUser.name}` : ''}.

              {isAdmin && (
                <button onClick={() => setAnnouncements(announcements.filter(a => a.id !== activeAnnouncement.id))} className="relative z-10 bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors"><X size={20} /></button>
              )}
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 col-span-1 lg:col-span-2">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold">Today's Schedule</h2>
                <button onClick={onAddEvent} className="text-blue-600 text-sm font-medium hover:underline flex items-center gap-1">
                  Add Event <Plus size={16} />
                </button>
              </div>
              <div className="space-y-4">
                {todayEvents.length > 0 ? (
                  todayEvents.map(event => (
                    <div key={event.id} className="flex items-center p-4 rounded-2xl bg-slate-50 border border-slate-100 transition-transform hover:scale-[1.01]">
                      <div className={`w-2 h-12 rounded-full ${event.color} mr-4`}></div>
                      <div className="flex-1">
                        <h4 className="font-bold text-[#0F172A]">{event.title}</h4>
                        <p className="text-sm text-[#64748B]">{event.category}</p>
                      </div>
                      <div className="font-medium text-slate-600 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm">{event.time}</div>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                    <CalendarIcon className="mx-auto mb-2 opacity-40 text-slate-400" size={32} />
                    <p className="font-medium text-slate-600 mt-2">No events scheduled.</p>

                <button onClick={onAddEvent} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-medium hover:border-blue-500 hover:text-blue-600 transition-colors">

              </div>
              <div className="space-y-3">
                {chores.length > 0 ? (
                  chores.map(chore => (
                    <div key={chore.id} className={`flex items-center gap-3 p-3 rounded-xl border ${chore.done ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-200 shadow-sm'}`}>
                      <div onClick={() => handleToggleChore(chore)} className={`w-6 h-6 rounded-md border flex items-center justify-center cursor-pointer ${chore.done ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-300'}`}>
                        {chore.done && <CheckSquare size={16} />}
                      </div>
                      <span className={`flex-1 font-medium ${chore.done ? 'line-through text-slate-500' : 'text-slate-800'}`}>{chore.title}</span>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">

    function CalendarView({ events, onAddEvent }) {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const dates = Array.from({length: 35}, (_, i) => i - 2);

            <div>
              <h1 className="text-3xl font-bold tracking-tight">Calendar</h1>
              <p className="text-slate-500">June</p>
            </div>
            <div className="flex gap-2">
              <button className="px-4 py-2 bg-white border border-slate-200 rounded-xl font-medium shadow-sm hover:bg-slate-50">Month</button>
              <button onClick={onAddEvent} className="px-4 py-2 bg-[#2563EB] text-white rounded-xl font-medium shadow-sm hover:bg-blue-700">Add Event</button>
            </div>
          </header>
          
          <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
              {days.map(day => (
                <div key={day} className="py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">{day}</div>
              ))}
            </div>
            <div className="flex-1 grid grid-cols-7 grid-rows-5">
              {dates.map((date, idx) => {
                const isCurrentMonth = date > 0 && date <= 30;
                const isToday = date === 22; 
                const dayEvents = events.filter(e => e.date === date);

                return (
                  <div key={idx} onClick={isCurrentMonth ? onAddEvent : undefined} className="border-b border-r border-slate-100 p-2 min-h-[100px] hover:bg-slate-50 transition-colors cursor-pointer relative group flex flex-col">
                    <div className="flex justify-between items-start">
                      <span className={`
                        inline-flex items-center justify-center w-7 h-7 rounded-full text-sm font-medium
                        ${!isCurrentMonth ? 'text-slate-300' : ''}

                      </span>

                      {isCurrentMonth && dayEvents.map(ev => (

                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );

    function ChoresView({ chores, setChores, members, setMembers, onAddChore, isAdmin }) {
      const handleToggle = (chore) => {
        const isNowDone = !chore.done;
        setChores(chores.map(c => c.id === chore.id ? { ...c, done: isNowDone } : c));
        
        // Update member points
        setMembers(members.map(m => {
          if (m.id === chore.assigneeId) {
            return { ...m, points: isNowDone ? (m.points || 0) + chore.points : (m.points || 0) - chore.points };
          }
          return m;
        }));
      };

      const handleDelete = (id) => {
        const chore = chores.find(c => c.id === id);
        if(chore && chore.done) {
          setMembers(members.map(m => m.id === chore.assigneeId ? { ...m, points: (m.points || 0) - chore.points } : m));
        }
        setChores(chores.filter(c => c.id !== id));
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6 fade-in">

            <div>
              <h1 className="text-3xl font-bold tracking-tight">Tasks & Chores</h1>
              <p className="text-slate-500 mt-1">Manage family tasks and earn points.</p>

                  <Plus size={18} /> Assign Chore

                     <div key={chore.id} className={`flex items-center justify-between p-4 rounded-xl border transition-all ${chore.done ? 'bg-slate-50 border-slate-100 opacity-70' : 'bg-white border-slate-200 shadow-sm hover:shadow-md'}`}>

                            {chore.done && <CheckSquare size={20} />}
                          </div>
                          <div>
                            <span className={`block font-bold text-lg ${chore.done ? 'line-through text-slate-500' : 'text-slate-800'}`}>{chore.title}</span>
                            <div className="flex items-center gap-3 mt-1">

                                <span className="flex items-center gap-1 text-xs font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md">
                                  <div className="w-4 h-4 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center text-[10px]">{assignee.name.charAt(0)}</div>
                                  {assignee.name}
                                </span>
                              )}
                              <span className="text-sm font-medium text-orange-500 flex items-center gap-1"><Star size={14} className="fill-orange-500"/> {chore.points} pts</span>
                            </div>
                          </div>
                        </div>
                        {isAdmin && (
                          <button onClick={() => handleDelete(chore.id)} className="text-slate-300 hover:text-red-500 p-2"><Trash2 size={20}/></button>
                        )}
                     </div>
                   );
                 })}
               </div>
             ) : (
                <div className="text-center py-16 text-slate-500 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">

                      <Plus size={16} /> Create your first chore
                    </button>
                  )}
                </div>
             )}
          </div>
        </div>
      );

    function ProgressView({ members, familyGoal }) {
      const totalPoints = members.reduce((sum, m) => sum + (m.points || 0), 0);
      const progressPercent = Math.min(100, Math.round((totalPoints / familyGoal) * 100));
      const sortedMembers = [...members].sort((a, b) => (b.points || 0) - (a.points || 0));

      return (
        <div className="max-w-5xl mx-auto space-y-6 fade-in">
          <header className="flex justify-between items-end mb-8">
            <div>

                <div className="relative h-6 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                  <div

      return (

            </div>

              <Upload size={18} /> Upload Photos
            </button>

            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

                 <div key={photo.id} className="aspect-square rounded-2xl overflow-hidden shadow-sm border border-slate-200 group relative">

                    <button onClick={() => setPhotos(photos.filter(p => p.id !== photo.id))} className="absolute top-2 right-2 bg-black/50 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500"><Trash2 size={16}/></button>

                          <div className="flex items-center gap-3">
                             <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center border border-slate-100 shadow-sm text-slate-800">
                                <svg width="20" height="20" viewBox="0 0 170 170"><path fill="currentColor" d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.74 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.92.21-9.84-1.96-14.74-6.53-3.13-2.73-7.1-7.43-11.92-14.09-6.23-8.65-11.84-19.2-16.85-31.62-5.01-12.43-7.51-24.31-7.51-35.65 0-13.41 3.23-24.61 9.69-33.6 4.31-5.91 9.69-10.42 16.14-13.56 6.45-3.13 13.06-4.74 19.83-4.84 4.02 0 9.04 1.15 15.06 3.44 6.03 2.3 10.15 3.46 12.35 3.46 1.83 0 6.13-1.22 12.89-3.66 6.75-2.44 12.06-3.56 15.93-3.35 15.11.74 26.54 6.36 34.28 16.89-13.52 7.82-19.86 19.38-19.03 34.69.8 15.34 8.78 27.27 23.95 35.81-2.47 5.76-5.04 11.41-7.69 16.96zm-24.96-103.88c-3.13 3.8-7.39 6.08-12.78 6.81-1.01-9.96 3.01-18.9 12.03-26.83 2.92-2.53 6.42-4.43 10.49-5.71 4.07-1.28 8.01-1.87 11.83-1.78-.71 9.94-4.82 18.67-12.3 26.17-2.6 2.5-5.69 4.38-9.27 5.66z"/></svg>
                             </div>
                             <div>
                               <p className="font-bold text-sm">Apple Calendar</p>
                               <p className={`text-xs font-medium flex items-center gap-1 ${appleConnected ? 'text-green-600' : 'text-slate-400'}`}>
                                  {appleConnected ? <><Check size={12}/> Connected</> : 'Not connected'}
                               </p>
                             </div>
                          </div>
                          {appleConnected ? (
                            <button onClick={() => setAppleConnected(false)} className="text-slate-400 hover:text-red-500 text-sm font-medium">Disconnect</button>
                          ) : (
                            <button onClick={() => setShowAppleModal(true)} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Connect</button>
                          )}
                        </div>
                        
                        {/* Outlook */}
                        <div className={`p-4 border rounded-xl flex items-center justify-between shadow-sm transition-all ${outlookConnected ? 'border-blue-200 bg-blue-50/30' : 'border-slate-200 bg-white hover:border-blue-200'}`}>
                          <div className="flex items-center gap-3">
                             <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center border border-slate-100 shadow-sm">
                                <span className="text-2xl text-blue-600 font-bold">O</span>
                             </div>
                             <div>
                               <p className="font-bold text-sm">Outlook / O365</p>
                               <p className={`text-xs font-medium flex items-center gap-1 ${outlookConnected ? 'text-green-600' : 'text-slate-400'}`}>
                                  {outlookConnected ? <><Check size={12}/> Connected</> : 'Not connected'}
                               </p>
                             </div>
                          </div>
                          {outlookConnected ? (
                            <button onClick={() => setOutlookConnected(false)} className="text-slate-400 hover:text-red-500 text-sm font-medium">Disconnect</button>
                          ) : (
                            <button onClick={() => setShowOutlookModal(true)} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">Connect</button>
                          )}
                        </div>
                      </div>
                    </div>

                    {/* Location & Weather Section */}
                    <div>
                      <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><MapPin size={18}/> Weather & Location</h3>
                      <div className="p-5 border border-slate-200 rounded-xl bg-white shadow-sm flex flex-col gap-3">
                        <p className="text-sm text-slate-500">Set your household location to display accurate, local weather on the Dashboard and Kiosk Display.</p>
                        <div className="flex gap-3 max-w-sm mt-2">
                          <input type="text" placeholder="Zip Code or City" value={zipCode} onChange={(e) => setZipCode(e.target.value)} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                          <button onClick={() => showMessage("Location Saved!")} className="bg-slate-800 text-white px-5 py-2 rounded-lg font-bold hover:bg-slate-900 transition-colors">Save</button>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- KIOSK MODE (Luma Display) ---
    function KioskMode({ onExit, household, events, chores, announcements, members, weather }) {
      const [time, setTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const activeAnnouncement = announcements && announcements.length > 0 ? announcements[0] : null;
      const todayEvents = events ? events.filter(e => e.date === 22 || e.date === parseInt(new Date().getDate().toString(), 10)) : [];

      return (
        <div className="fixed inset-0 bg-[#F8FAFC] text-slate-800 z-[100] flex flex-col p-8 overflow-hidden select-none fade-in">
          {/* Invisible exit button in top left corner (for testing/setup) */}
          <div className="absolute top-0 left-0 w-24 h-24 z-50 cursor-pointer" onClick={onExit} />
          
          <header className="flex justify-between items-start mb-10">
            <div>
              <h2 className="text-3xl font-bold text-slate-500">{household?.name || 'Luma'}</h2>
              <p className="text-2xl text-blue-600 flex items-center gap-2 mt-2 font-medium">
                 {weather && weather.icon && <weather.icon size={28} />} {weather?.temp}° {weather?.condition}
              </p>
            </div>
            <div className="text-right">
              <h1 className="text-8xl font-black tracking-tighter text-slate-900 drop-shadow-sm">
                {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
              </h1>
              <p className="text-3xl text-slate-500 mt-3 font-bold">
                {time.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' })}
              </p>
            </div>
          </header>

          <div className="grid grid-cols-3 gap-8 flex-1">
            
            <div className="col-span-1 flex flex-col gap-8">
              {/* Announcements Box */}
              {activeAnnouncement && (
                <div className="bg-gradient-to-br from-orange-400 to-orange-500 rounded-[2rem] p-8 shadow-lg text-white">
                  <div className="flex items-center gap-3 mb-4 opacity-80 uppercase tracking-widest text-sm font-bold"><Megaphone size={20}/> Announcement</div>
                  <h3 className="text-3xl font-bold mb-3 leading-tight">{activeAnnouncement.title}</h3>
                  <p className="text-xl opacity-90">{activeAnnouncement.text}</p>
                </div>
              )}

              {/* Tasks Box */}
              <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200 flex-1 flex flex-col">
                <h3 className="text-3xl font-bold mb-8 flex items-center gap-4 text-slate-800">
                   <CheckSquare className="text-blue-500" size={32} /> Today's Tasks
                </h3>
                <div className="space-y-6 flex-1 overflow-hidden">
                  {chores && chores.length > 0 ? (
                    chores.map(chore => {
                      const assignee = members?.find(m => m.id === chore.assigneeId);
                      return (
                        <div key={chore.id} className={`flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${chore.done ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-100 shadow-sm'}`}>
                          <div className="flex items-center gap-5">
                            <div className={`w-10 h-10 rounded-xl border-4 flex items-center justify-center ${chore.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300 text-transparent'}`}>
                              <CheckSquare size={24} />
                            </div>
                            <span className={`text-2xl font-bold ${chore.done ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{chore.title}</span>
                          </div>
                          {assignee && (
                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-lg">{assignee.name.charAt(0)}</div>
                          )}
                        </div>
                      )
                    })
                  ) : (
                    <div className="h-full flex flex-col items-center justify-center text-slate-400">
                       <CheckSquare size={64} className="mb-6 opacity-20" />
                       <p className="text-2xl font-medium">No tasks assigned today.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="col-span-2 bg-white rounded-[2rem] p-10 shadow-sm border border-slate-200">
               <h3 className="text-3xl font-bold mb-10 flex items-center gap-4 text-slate-800">
                 <CalendarIcon className="text-orange-500" size={36} /> Upcoming Schedule
              </h3>
              <div className="space-y-6">
                 {todayEvents.length > 0 ? (
                   todayEvents.map(event => (
                    <div key={event.id} className="flex items-center gap-8 bg-slate-50 border border-slate-100 p-8 rounded-3xl">
                      <div className="text-4xl font-black text-slate-800 w-40">{event.time}</div>
                      <div className={`w-3 h-20 rounded-full ${event.color}`}></div>
                      <div>
                        <h4 className="text-3xl font-bold text-slate-800 mb-2">{event.title}</h4>
                        <p className="text-2xl text-slate-500 font-medium">{event.category}</p>
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 mt-32">
                     <CalendarIcon size={80} className="mb-6 opacity-20" />
                     <p className="text-3xl font-medium text-slate-500">Clear calendar ahead.</p>
                     <p className="text-xl mt-3">Enjoy your day!</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- LOGIN / DISPLAY SETUP SCREEN ---
    function AuthScreen({ onPairDisplay, onLoginSuccess }) {
      const [isPairingMode, setIsPairingMode] = useState(false);
      const [pairingCode, setPairingCode] = useState("");
      const [pairingError, setPairingError] = useState(null);
      const [isRegistering, setIsRegistering] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [authError, setAuthError] = useState(null);
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      useEffect(() => {
        let unsub = () => {};
        if (isPairingMode) {
          const code = Math.random().toString(36).substring(2, 8).toUpperCase();
          setPairingCode(code);
          setPairingError(null);
          
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pairing_codes', code);
          
          setDoc(docRef, { status: 'waiting', createdAt: serverTimestamp() }).catch(err => {
             console.error(err);
             setPairingError({ text: "Failed to generate pairing code. Please check your internet or Firebase Rules.", details: err.message });
          });
          
          unsub = onSnapshot(docRef, (snap) => {
             if (snap.exists() && snap.data().status === 'linked') {
                 onPairDisplay(snap.data().household);
                 // Cleanup the code after successful link
                 deleteDoc(docRef).catch(console.error);
             }
          }, (err) => {
             console.error(err);
             setPairingError({ text: "Lost connection to the pairing server.", details: err.message });
          });
        }
        return () => unsub();
      }, [isPairingMode, onPairDisplay]);

      const handleGoogleLogin = async () => {
        setAuthError(null);
        const provider = new GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/calendar.readonly');
        provider.addScope('https://www.googleapis.com/auth/calendar.events');
        try {
          await signInWithPopup(auth, provider);
          if (onLoginSuccess) onLoginSuccess();
        } catch (error) {
          setAuthError({ text: "Google Sign-In failed.", details: error.message });
        }
      };

      const handleEmailAuth = async (e) => {
        e.preventDefault();
        setAuthError(null);
        setIsAuthenticating(true);
        try {
          if (isRegistering) {
            await createUserWithEmailAndPassword(auth, email, password);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
          if (onLoginSuccess) onLoginSuccess();
        } catch (error) {
          let detailMsg = error.message;
          if (error.message.includes('Missing or insufficient permissions')) {
            detailMsg = "Permission Denied: Your Firebase Security Rules are blocking this action. Please go to your Firebase Console > Firestore Database > Rules, and update them to allow access.";
          }
          setAuthError({ text: "Authentication failed.", details: detailMsg });
        } finally {
          setIsAuthenticating(false);
        }
      };

      if (isPairingMode) {
        return (
          <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="mx-auto h-16 w-16 bg-slate-800 rounded-2xl shadow-xl flex items-center justify-center text-white mb-6"><Monitor size={32} /></div>
              <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Setup Luma Display</h2>
              <p className="mt-2 text-center text-sm text-slate-600">Enter this code in your Luma App under Settings &gt; Displays to link this device.</p>
            </div>
            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-12 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200 text-center relative overflow-hidden">
                 
                 <ErrorAlert error={pairingError} />

                 <div className="text-5xl sm:text-6xl font-mono tracking-[0.15em] font-bold text-[#2563EB] mb-8 select-all">{pairingCode || "------"}</div>
                 <div className="flex items-center justify-center gap-3 text-slate-500 mb-8">
                   <div className="w-5 h-5 border-2 border-slate-300 border-t-[#2563EB] rounded-full animate-spin"></div>
                   <span className="font-medium">Waiting for connection...</span>
                 </div>
                 <button onClick={() => { setIsPairingMode(false); setPairingCode(""); setPairingError(null); }} className="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 sm:px-6 lg:px-8 fade-in">
          <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div className="mx-auto h-16 w-16 bg-[#2563EB] rounded-2xl shadow-xl flex items-center justify-center text-white font-bold text-4xl mb-6">L</div>
            <h2 className="text-center text-3xl font-extrabold text-[#0F172A] tracking-tight">Welcome to Luma</h2>
            <p className="mt-2 text-center text-sm text-slate-600">Life, Organized.</p>
          </div>

          <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div className="bg-white py-8 px-4 shadow-sm sm:rounded-3xl sm:px-10 border border-slate-200">
              
              <ErrorAlert error={authError} />

              <form onSubmit={handleEmailAuth} className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                  <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="you@example.com" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                  <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" />
                </div>
                <button type="submit" disabled={isAuthenticating} className="w-full py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-[#0F172A] hover:bg-slate-800 transition-colors disabled:opacity-70">
                  {isAuthenticating ? 'Please wait...' : (isRegistering ? 'Create Account' : 'Sign In')}
                </button>
              </form>

              <div className="text-center mb-6">
                <button onClick={() => { setIsRegistering(!isRegistering); setAuthError(null); }} className="text-sm font-medium text-blue-600 hover:underline">
                  {isRegistering ? 'Already have an account? Sign in' : "Don't have an account? Sign up"}
                </button>
              </div>

              <div className="relative mb-6">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200" /></div>
                <div className="relative flex justify-center text-sm"><span className="px-2 bg-white text-slate-400">or continue with</span></div>
              </div>

              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
              </button>

              <div className="mt-8 pt-6 border-t border-slate-100">
                <button onClick={() => setIsPairingMode(true)} className="w-full flex items-center justify-center gap-3 py-3 px-4 border border-dashed border-slate-300 rounded-xl text-sm font-medium text-slate-600 hover:border-slate-400 hover:bg-slate-50 transition-colors">
                  <Monitor size={18} className="text-slate-400" /> Setup a Luma Display
                </button>
              </div>
              
            </div>
          </div>
        </div>
      );
    }

    try {
      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (renderError) {
      console.error("Critical rendering error:", renderError);
    }

    try {
      if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => console.log('Service Worker registered.'))
            .catch((error) => console.error('Service Worker registration failed: ', error));
        });
      }
    } catch (swError) {
      // Ignore Service Worker initialisation errors in restricted iframe environments
    }
  </script>
</body>
</html>
